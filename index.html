<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM — Inventaire</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a1a;--sf:#242424;--bd:#333;--tx:#e0e0e0;--mt:#888;--ac:#c8a86e;--ad:#8a7040;--dg:#a04040;--wh:#fff;--bk:#000}
body{font-family:'JetBrains Mono','SF Mono','Consolas',monospace;background:var(--bg);color:var(--tx)}
#app{display:flex;flex-direction:column;height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf);position:sticky;top:0;z-index:100}
header h1{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--ac);text-transform:uppercase}
nav{display:flex;gap:2px}
nav button{font-family:inherit;padding:5px 10px;font-size:10px;border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase;background:transparent;color:var(--mt)}
nav button.active{background:var(--ac);color:var(--bk);font-weight:700}
#debug{padding:3px 16px;font-size:9px;color:var(--mt);background:#1e1e1e;border-bottom:1px solid var(--bd)}
#debug.error{color:#ff6666}
.body{flex:1;display:flex;overflow:hidden}
.sidebar{width:280px;min-width:280px;border-right:1px solid var(--bd);background:var(--sf);display:flex;flex-direction:column;flex-shrink:0}
.filters{padding:8px 10px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:5px}
.filters input,.filters select{font-family:inherit;background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:5px 7px;font-size:11px;width:100%;outline:none}
.list{flex:1;overflow-y:auto}.list-item{padding:7px 10px;border-bottom:1px solid var(--bd);cursor:pointer;display:flex;gap:7px;align-items:center;border-left:3px solid transparent}
.list-item:hover{background:#2a2a2a}.list-item.active{background:rgba(138,112,64,0.19);border-left-color:var(--ac)}
.lt{width:36px;height:36px;object-fit:cover;background:var(--bg);flex-shrink:0;border:1px solid var(--bd)}
.lte{width:36px;height:36px;background:var(--bg);flex-shrink:0;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--mt)}
.li{flex:1;overflow:hidden}.ln{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ls{font-size:9px;color:var(--mt);margin-top:1px}
.badge{font-size:8px;padding:1px 4px;background:var(--ad);color:var(--wh);font-weight:600}
.stats{padding:10px;border-top:1px solid var(--bd);font-size:9px;color:var(--mt);margin-top:auto}
.main{flex:1;overflow-y:auto;padding:16px}

/* Image viewer - admin uses img, public uses canvas */
.iv{position:relative;background:var(--bk);border:1px solid var(--bd);margin-bottom:12px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.iv.zoomed{overflow:hidden}
.iv.dragging{cursor:grabbing}
.iv img{display:block;max-width:100%;max-height:100%;user-select:none;-webkit-user-drag:none;cursor:zoom-in;transition:none}
.iv.zoomed img{cursor:grab}
.iv canvas{display:block;max-width:100%;max-height:100%;margin:0 auto}
.iv .zbar{position:absolute;bottom:6px;right:6px;display:flex;gap:3px;z-index:10}
.iv .zbar button{font-family:inherit;font-size:9px;padding:2px 7px;background:rgba(36,36,36,0.85);color:var(--tx);border:1px solid var(--bd);cursor:pointer}
.iv .zbar button:hover{background:var(--bd)}
.iv .zlvl{position:absolute;bottom:6px;left:6px;font-size:9px;color:var(--mt);z-index:10}
/* Watermark overlay */
.iv .wm{position:absolute;inset:0;pointer-events:none;z-index:5;opacity:0.06;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:60px;transform:rotate(-25deg);overflow:hidden;font-size:14px;color:var(--wh);letter-spacing:4px;font-weight:700;user-select:none}

.tstrip{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;padding:3px 0}
.tstrip img{width:44px;height:44px;object-fit:cover;border:2px solid transparent;cursor:pointer;background:var(--bg);flex-shrink:0}
.tstrip img.active{border-color:var(--ac)}
.tstrip .add{width:44px;height:44px;border:2px dashed var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mt);font-size:14px;flex-shrink:0;background:var(--bg)}
.tstrip .add:hover{border-color:var(--ac);color:var(--ac)}

.dh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.dt{font-size:18px;font-weight:700;color:var(--wh)}
.di{font-size:10px;color:var(--mt);margin-top:3px;word-break:break-all}
.dp{font-size:16px;font-weight:700;color:var(--ac)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-bottom:12px}
.fl{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;margin-bottom:1px}
.fv{font-size:12px}
.dn{margin-bottom:10px}.dn p{font-size:11px;line-height:1.5}
.nb{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:6px 0;border-bottom:1px solid var(--bd)}
.nb .pos{font-size:10px;color:var(--mt)}
.nbtn{font-family:inherit;padding:3px 10px;font-size:10px;background:var(--sf);color:var(--tx);border:1px solid var(--bd);cursor:pointer}
.nbtn:hover{background:var(--bd)}.nbtn:disabled{opacity:0.3;cursor:default}
.nk{font-size:8px;color:var(--mt);margin-left:6px}
.btn{font-family:inherit;padding:7px 14px;font-size:10px;font-weight:600;border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--ac);color:var(--bk)}.bd{background:var(--dg);color:var(--wh)}.bs{background:var(--sf);color:var(--tx)}
.brow{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.ffull{grid-column:1/-1}.ff{display:flex;flex-direction:column;gap:3px}
.ff input,.ff select,.ff textarea{font-family:inherit;background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:5px 7px;font-size:11px;width:100%;outline:none}
.ff textarea{min-height:50px;resize:vertical}
.ff label.chk{font-size:11px;display:flex;align-items:center;gap:5px;cursor:pointer}
.dz{border:2px dashed var(--bd);padding:16px;text-align:center;cursor:pointer;color:var(--mt);font-size:10px;background:var(--bg);margin-top:6px}
.dz.over{border-color:var(--ac)}
.gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.gc{cursor:pointer;background:var(--sf);border:1px solid var(--bd);overflow:hidden}
.gi{width:100%;aspect-ratio:1;object-fit:cover;background:var(--bk);display:block}
.ge{width:100%;aspect-ratio:1;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--mt);font-size:9px}
.gn{padding:5px 7px}.gt{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.gs{font-size:8px;color:var(--mt);margin-top:1px}
.cnt{font-size:10px;color:var(--mt);margin-bottom:10px}
.empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--mt);font-size:11px;text-align:center;padding:20px}
.toast{position:fixed;bottom:16px;right:16px;padding:8px 14px;font-size:11px;font-weight:600;z-index:1000}
.tok{background:var(--ac);color:var(--bk)}.terr{background:var(--dg);color:var(--wh)}
.hidden{display:none}.lazy{opacity:0}.loaded{opacity:1;transition:opacity 0.3s ease}.img-err{opacity:0}
/* Export workspace */
.exp-top{background:var(--sf);border:1px solid var(--bd);padding:10px 16px;margin-bottom:12px}
.exp-filters{display:flex;flex-wrap:wrap;gap:4px;align-items:flex-start}
.exp-row{display:flex;gap:4px;align-items:center;background:var(--bg);padding:3px 6px;border:1px solid var(--bd)}
.exp-row select,.exp-row input{font-family:inherit;background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:3px 5px;font-size:10px;outline:none}
.exp-row select{max-width:110px}.exp-row input{width:80px}
.exp-row .x{background:none;color:var(--dg);border:none;cursor:pointer;font-size:12px;font-family:inherit;padding:0 2px}
.exp-add{font-family:inherit;font-size:10px;color:var(--ac);background:none;border:1px dashed var(--bd);padding:3px 10px;cursor:pointer;align-self:center}
.exp-add:hover{border-color:var(--ac)}
.exp-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;margin-bottom:12px;background:var(--sf);border:1px solid var(--bd);flex-wrap:wrap}
.exp-bar button,.exp-bar select,.exp-bar label{font-family:inherit;font-size:9px}
.exp-bar button{padding:3px 10px;background:var(--bg);color:var(--tx);border:1px solid var(--bd);cursor:pointer;text-transform:uppercase;letter-spacing:0.5px}
.exp-bar button:hover{border-color:var(--ac);color:var(--ac)}
.exp-bar select{background:var(--bg);color:var(--tx);border:1px solid var(--bd);padding:3px 6px}
.exp-bar .sep{width:1px;height:16px;background:var(--bd)}
.exp-bar .cnt{font-size:10px;color:var(--mt)}
.gc.selected{border:2px solid var(--ac)!important}
.exp-formats{display:flex;gap:6px;flex-wrap:wrap;padding:12px 0;align-items:center;margin-top:12px;border-top:1px solid var(--bd)}
.exp-fmt{font-family:inherit;padding:6px 14px;font-size:9px;font-weight:600;background:var(--bg);color:var(--tx);border:1px solid var(--bd);cursor:pointer;letter-spacing:1px;text-transform:uppercase}
.exp-fmt:hover{border-color:var(--ac);color:var(--ac)}
.exp-status{font-size:9px;color:var(--mt);margin-top:8px}
/* Public */
.ph{text-align:center;padding:24px 16px 16px;border-bottom:1px solid var(--bd)}.ph h1{font-size:18px;font-weight:700;color:var(--ac);letter-spacing:4px;text-transform:uppercase}.ph p{font-size:11px;color:var(--mt);margin-top:4px;letter-spacing:1px}
.pgal{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding:20px}
.pc{background:var(--sf);border:1px solid var(--bd);overflow:hidden;cursor:pointer;position:relative}
.pc canvas{width:100%;aspect-ratio:4/5;display:block;background:var(--bk)}
.pc .pi{padding:10px 12px}.pc .pi h3{font-size:12px;font-weight:600;color:var(--wh)}.pc .pi p{font-size:10px;color:var(--mt);margin-top:3px}
.pdet{max-width:800px;margin:0 auto;padding:20px}
.pdet canvas{width:100%;max-height:70vh;display:block;background:var(--bk);margin-bottom:16px}
.pdet h2{font-size:20px;font-weight:700;color:var(--wh);margin-bottom:8px}
.pdet .meta{font-size:11px;color:var(--mt);line-height:1.8}
.pbk{font-family:inherit;font-size:10px;color:var(--mt);background:none;border:none;cursor:pointer;padding:16px;letter-spacing:1px;text-transform:uppercase}.pbk:hover{color:var(--ac)}
/* Responsive */
@media(max-width:768px){.body{flex-direction:column}.sidebar{width:100%;max-height:45vh;border-right:none;border-bottom:1px solid var(--bd)}.main{padding:12px}.dg,.fgrid{grid-template-columns:1fr}.ffull{grid-column:1}.gal{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}.pgal{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));padding:12px}.nk{display:none}header h1{font-size:11px}nav button{padding:4px 8px;font-size:9px}}
@media(max-width:480px){.sidebar{max-height:35vh}.gal{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px}.pgal{grid-template-columns:1fr 1fr;gap:8px;padding:8px}.dh{flex-direction:column;gap:8px}.brow{flex-direction:column}.btn{width:100%;justify-content:center}}
</style>

<body>
<div id="app"></div>
<div id="toast" class="toast hidden"></div>
<script>
const SB="https://mcrzsxrcoexnlwmaunte.supabase.co",KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo",BKT="paintings",STR=`${SB}/storage/v1/object/public/${BKT}`;
const FDIM={1:[84,59.4],2:[59.4,42],3:[42,29.7],4:[29.7,21],5:[21,14.8],6:[14.8,10.5],7:[25.4,20.3]};
const PUB=new URLSearchParams(location.search).get("mode")==="public";
const WM_TEXT="© PEM";
let oeuvres=[],techniques=[],supports=[],formats=[],contacts=[],imgTbl=[];
let tM={},sM={},fM={},cM={},filtered=[],selId=null,curV="list";

// Right-click enabled (image protection handled by canvas watermark)

async function api(p,o={}){const s=p.includes("?")?"&":"?";const r=await fetch(`${SB}/rest/v1/${p}${s}apikey=${KEY}`,{...o,headers:{"Content-Type":"application/json",Prefer:"return=representation",apikey:KEY,Authorization:`Bearer ${KEY}`,...o.headers}});if(!r.ok)throw new Error(`${r.status}: ${await r.text()}`);return r.json();}
async function upl(f,n){const r=await fetch(`${SB}/storage/v1/object/${BKT}/${encodeURIComponent(n)}`,{method:"POST",headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":f.type,"x-upsert":"true"},body:f});if(!r.ok)throw new Error(await r.text());}
function iu(f){if(!f)return null;return f.startsWith("http")?f:`${STR}/${encodeURIComponent(f)}`;}
function iuThumb(f,size){if(!f)return null;const s=size||100;if(f.startsWith("http"))return f;return`${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(f)}?width=${s}&height=${s}&resize=cover`;}
// Medium res for viewer: render at 1600px width, maintains aspect ratio — good quality, ~200-400KB instead of 3-4MB
function iuMed(f){if(!f)return null;if(f.startsWith("http"))return f;return`${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(f)}?width=1600&quality=85`;}
function dm(o){return{h:o.Hauteur||(o.Format&&FDIM[o.Format]?String(FDIM[o.Format][0]):null),l:o.Largeur||(o.Format&&FDIM[o.Format]?String(FDIM[o.Format][1]):null)};}
function mkN(id,seq,orig){const ext=orig.split(".").pop().toLowerCase();const base=orig.replace(/\.[^.]+$/,"");const cl=base.replace(/[^a-zA-Z0-9_-]/g,"_").replace(/_+/g,"_").replace(/^_|_$/g,"");return`W_${String(id).padStart(4,"0")}_${String(seq).padStart(2,"0")}_${cl}.${ext}`;}
function nxS(oid){let mx=0;const p=new RegExp(`^W_${String(oid).padStart(4,"0")}_(\\d+)_`);oeuvres.forEach(o=>{const m=(o.txtImageNameLink||"").match(p);if(m)mx=Math.max(mx,parseInt(m[1]));});imgTbl.filter(i=>i.OeuvreID===oid).forEach(i=>{const m=(i.txtImageNameLink||"").match(p);if(m)mx=Math.max(mx,parseInt(m[1]));});return mx+1;}
function iFor(oid){return imgTbl.filter(i=>i.OeuvreID===oid).sort((a,b)=>(a.SeqNo||0)-(b.SeqNo||0));}
function dbg(m,e){const el=document.getElementById("debug");if(el){el.textContent=m;el.className=e?"error":"";}}
function tst(m,e){const el=document.getElementById("toast");el.textContent=m;el.className=`toast ${e?"terr":"tok"}`;setTimeout(()=>el.className="toast hidden",3000);}
function esc(s){if(!s)return"";const d=document.createElement("div");d.textContent=String(s);return d.innerHTML;}
function gv(id){return document.getElementById(id)?.value||"";}
function gvn(id){const v=gv(id);return v?Number(v):null;}

// ── Protected image rendering via Canvas ──
// Images are drawn onto a canvas — cannot be right-clicked/saved/dragged as images
function drawProtected(canvasId, url, opts={}){
  const cvs=document.getElementById(canvasId);if(!cvs)return;
  const ctx=cvs.getContext("2d");
  const img=new Image();
  img.crossOrigin="anonymous";
  img.onload=()=>{
    const maxW=opts.maxW||cvs.parentElement.clientWidth||600;
    const maxH=opts.maxH||400;
    const scale=Math.min(maxW/img.naturalWidth,maxH/img.naturalHeight,1);
    cvs.width=img.naturalWidth*scale;
    cvs.height=img.naturalHeight*scale;
    ctx.drawImage(img,0,0,cvs.width,cvs.height);
    // Draw watermark
    if(opts.watermark!==false){
      ctx.save();
      ctx.globalAlpha=0.07;
      ctx.font="bold 20px monospace";
      ctx.fillStyle="#ffffff";
      ctx.translate(cvs.width/2,cvs.height/2);
      ctx.rotate(-0.4);
      for(let y=-cvs.height;y<cvs.height;y+=80){
        for(let x=-cvs.width;x<cvs.width;x+=180){
          ctx.fillText(WM_TEXT,x,y);
        }
      }
      ctx.restore();
    }
    // Store natural dims for zoom
    cvs._natW=img.naturalWidth;cvs._natH=img.naturalHeight;cvs._img=img;
    if(opts.onReady)opts.onReady(img);
  };
  img.onerror=()=>{cvs.width=1;cvs.height=1;};
  img.src=url;
}

// Low-res download (max 600px wide, heavy watermark)
function downloadLowRes(url,title){
  const cvs=document.createElement("canvas");
  const ctx=cvs.getContext("2d");
  const img=new Image();img.crossOrigin="anonymous";
  img.onload=()=>{
    const maxW=600,sc=Math.min(maxW/img.naturalWidth,1);
    cvs.width=img.naturalWidth*sc;cvs.height=img.naturalHeight*sc;
    ctx.drawImage(img,0,0,cvs.width,cvs.height);
    // Heavy watermark for download
    ctx.globalAlpha=0.15;ctx.font="bold 24px monospace";ctx.fillStyle="#ffffff";
    ctx.translate(cvs.width/2,cvs.height/2);ctx.rotate(-0.4);
    for(let y=-cvs.height;y<cvs.height;y+=70)for(let x=-cvs.width;x<cvs.width;x+=160)ctx.fillText("© PEM",x,y);
    // Download
    const a=document.createElement("a");a.download=`${title||"pem"}_lowres.jpg`;
    a.href=cvs.toDataURL("image/jpeg",0.7);a.click();
  };img.src=url;
}

async function apiAll(table,order,pageSize=1000){
  let all=[],offset=0;
  while(true){
    const data=await api(`${table}?order=${order}&limit=${pageSize}&offset=${offset}`);
    all=all.concat(data);
    if(data.length<pageSize)break;
    offset+=data.length;
  }
  return all;
}

async function load(){
  try{dbg("Chargement...");
    const[o,t,su,f,c,im]=await Promise.all([
      apiAll("Oeuvres","OeuvreID.desc"),
      api("Technique?order=TechniqueID.asc"),
      api("Support?order=SupportID.asc"),
      api("Format?order=FormatID.asc"),
      api("Contact?order=ContactID.asc"),
      apiAll("tblImage","OeuvreID.asc,SeqNo.asc")
    ]);
    oeuvres=o;techniques=t;supports=su;formats=f;contacts=c;imgTbl=im;
    tM=Object.fromEntries(t.map(x=>[x.TechniqueID,x.Technique]));sM=Object.fromEntries(su.map(x=>[x.SupportID,x.Support]));fM=Object.fromEntries(f.map(x=>[x.FormatID,x.Format]));cM=Object.fromEntries(c.map(x=>[x.ContactID,x.NomInstitution]));
    const imgCount=o.filter(x=>x.txtImageNameLink).length;
    dbg(`${o.length} oeuvres · ${imgCount} avec image · ${im.length} tblImage`);
    if(PUB)initPub();else{popF();applyF();upSt();}
  }catch(e){dbg("ERREUR: "+e.message,true);}
}

// ═══ PUBLIC ═══
function initPub(){const pub=oeuvres.filter(o=>o.Exposable&&o.txtImageNameLink).sort((a,b)=>(b["Année"]||"").localeCompare(a["Année"]||""));document.getElementById("app").innerHTML=`<div class="ph"><h1>Pierre Emmanuel Moulin</h1><p>Peinture · Dessin</p></div><div id="pm"></div>`;window._pub=pub;pubGal();}
function pubGal(){const pm=document.getElementById("pm");pm.innerHTML=`<div class="pgal">${window._pub.map((o,i)=>{const d=dm(o);return`<div class="pc" onclick="pubDet(${o.OeuvreID})"><canvas id="pc${i}" style="width:100%;aspect-ratio:4/5"></canvas><div class="pi"><h3>${esc(o.Titre||"Sans titre")}</h3><p>${tM[o.Technique]||""} ${sM[o.Support]?`sur ${sM[o.Support]}`:""}${d.h&&d.l?` · ${d.h}×${d.l}`:""} · ${o["Année"]?String(o["Année"]).slice(0,4):""}</p></div></div>`;}).join("")}</div>`;
  // Draw canvases with lazy observer
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){const c=e.target;const idx=parseInt(c.id.replace("pc",""));const o=window._pub[idx];if(o)drawProtected(c.id,iu(o.txtImageNameLink),{maxW:400,maxH:500});obs.unobserve(c);}});},{rootMargin:"50px"});
  document.querySelectorAll("[id^=pc]").forEach(c=>obs.observe(c));

// Lightweight EXIF reader — reads first 64KB of JPEG to extract basic tags
async function readExif(url){
  try{
    const r=await fetch(url,{headers:{Range:"bytes=0-65535"}});
    if(!r.ok)return null;
    const buf=await r.arrayBuffer();
    const dv=new DataView(buf);
    if(dv.getUint16(0)!==0xFFD8)return null; // not JPEG
    
    let offset=2;
    while(offset<dv.byteLength-4){
      const marker=dv.getUint16(offset);
      if(marker===0xFFE1)break; // APP1 = EXIF
      const len=dv.getUint16(offset+2);
      offset+=2+len;
    }
    if(offset>=dv.byteLength-4)return null;
    
    const app1Len=dv.getUint16(offset+2);
    const exifStart=offset+4;
    
    // Check "Exif\0\0"
    if(dv.getUint32(exifStart)!==0x45786966)return null;
    
    const tiffStart=exifStart+6;
    const le=dv.getUint16(tiffStart)===0x4949; // little-endian?
    const g16=(o)=>le?dv.getUint16(tiffStart+o,true):dv.getUint16(tiffStart+o,false);
    const g32=(o)=>le?dv.getUint32(tiffStart+o,true):dv.getUint32(tiffStart+o,false);
    const gStr=(o,len)=>{let s="";for(let i=0;i<len&&tiffStart+o+i<dv.byteLength;i++){const c=dv.getUint8(tiffStart+o+i);if(c===0)break;s+=String.fromCharCode(c);}return s.trim();};
    const gRat=(o)=>{const n=g32(o),d=g32(o+4);return d?n/d:0;};
    
    const result={};
    
    function readIFD(ifdOff){
      if(ifdOff+2>dv.byteLength)return;
      const count=g16(ifdOff);
      for(let i=0;i<count;i++){
        const entOff=ifdOff+2+i*12;
        if(entOff+12>dv.byteLength)break;
        const tag=g16(entOff);
        const type=g16(entOff+2);
        const num=g32(entOff+4);
        const valOff=num>4?g32(entOff+8):entOff+8;
        
        switch(tag){
          case 0x010F: result.camera=gStr(valOff,num);break; // Make
          case 0x0110: result.camera=(result.camera?result.camera+" ":"")+gStr(valOff,num);break; // Model
          case 0x9003: result.date=gStr(valOff,num).replace(/:/g,"-").slice(0,10);break; // DateTimeOriginal
          case 0x829A: result.exposure=`1/${Math.round(1/gRat(valOff))}s`;break; // ExposureTime
          case 0x829D: result.aperture=gRat(valOff).toFixed(1);break; // FNumber
          case 0x8827: result.iso=type===3?g16(entOff+8):g32(entOff+8);break; // ISO
          case 0x920A: result.focal=Math.round(gRat(valOff));break; // FocalLength
          case 0xA434: result.lens=gStr(valOff,num);break; // LensModel
          case 0x8769: readIFD(g32(entOff+8));break; // ExifIFD pointer
        }
      }
    }
    
    const ifd0Off=g32(4);
    readIFD(ifd0Off);
    return Object.keys(result).length?result:null;
  }catch(e){return null;}
}

// ── Zoom: image is attached to container. No float. ──
// ZMIN=1 means the image never gets smaller than its fitted size.
// Translate is clamped so image edges never leave the container edges.
const ZMAX=3;
let _z={s:1,tx:0,ty:0,dr:false,lx:0,ly:0};

function getImgDims(){
  const vw=document.getElementById("ivw"),img=document.getElementById("vi");
  if(!vw||!img||!img.naturalWidth)return null;
  const cw=vw.clientWidth;
  // Base rendered size (image fitted to container width)
  const baseW=Math.min(cw,img.naturalWidth);
  const baseH=baseW*(img.naturalHeight/img.naturalWidth);
  // Scaled size
  const sW=baseW*_z.s,sH=baseH*_z.s;
  return{cw,ch:vw.clientHeight,baseW,baseH,sW,sH};
}

function clampTx(){
  const d=getImgDims();if(!d)return;
  // If image is smaller than container: no translate allowed (centered by flex)
  // If image is bigger: clamp so edges don't leave container
  if(d.sW<=d.cw){_z.tx=0;}
  else{const maxTx=(d.sW-d.cw)/2;_z.tx=Math.max(-maxTx,Math.min(maxTx,_z.tx));}
  if(d.sH<=d.ch){_z.ty=0;}
  else{const maxTy=(d.sH-d.ch)/2;_z.ty=Math.max(-maxTy,Math.min(maxTy,_z.ty));}
}

function initIZ(){
  const vw=document.getElementById("ivw"),img=document.getElementById("vi");
  if(!vw||!img)return;
  _z={s:1,tx:0,ty:0,dr:false,lx:0,ly:0};
  const setup=()=>{
    if(!img.naturalWidth)return;
    _z.s=1;_z.tx=0;_z.ty=0;adjH();aIZ();
  };
  if(img.complete&&img.naturalWidth)setup();img.onload=setup;

  vw.onwheel=e=>{
    e.preventDefault();if(!img.naturalWidth)return;
    const d=e.deltaY>0?0.9:1.12;
    const ns=Math.max(1,Math.min(ZMAX,_z.s*d));
    if(ns===_z.s)return;
    if(ns>_z.s){
      // Zooming IN: zoom toward cursor
      const r=img.getBoundingClientRect();
      const cx=e.clientX-(r.left+r.width/2),cy=e.clientY-(r.top+r.height/2);
      _z.tx+=cx*(1-ns/_z.s);_z.ty+=cy*(1-ns/_z.s);
    }else{
      // Zooming OUT: scale translate toward 0 proportionally
      const ratio=(ns-1)/Math.max(_z.s-1,0.01);
      _z.tx*=ratio;_z.ty*=ratio;
    }
    _z.s=ns;clampTx();adjH();aIZ();
  };
  vw.onmousedown=e=>{
    if(e.target.tagName==="BUTTON")return;
    if(_z.s<=1)return; // no drag when not zoomed
    _z.dr=true;_z.lx=e.clientX;_z.ly=e.clientY;
    vw.classList.add("zoomed","dragging");
  };
  vw.onmousemove=e=>{
    if(!_z.dr)return;
    _z.tx+=e.clientX-_z.lx;_z.ty+=e.clientY-_z.ly;
    _z.lx=e.clientX;_z.ly=e.clientY;
    clampTx();aIZ();
  };
  vw.onmouseup=()=>{_z.dr=false;vw.classList.remove("dragging");};
  vw.onmouseleave=()=>{_z.dr=false;vw.classList.remove("dragging");};
  let ltd=0;
  vw.ontouchstart=e=>{
    if(e.touches.length===2)ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    else if(_z.s>1){_z.dr=true;_z.lx=e.touches[0].clientX;_z.ly=e.touches[0].clientY;}
  };
  vw.ontouchmove=e=>{
    e.preventDefault();
    if(e.touches.length===2&&ltd){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      _z.s=Math.max(1,Math.min(ZMAX,_z.s*(d/ltd)));ltd=d;clampTx();adjH();aIZ();
    }else if(_z.dr&&e.touches.length===1){
      _z.tx+=e.touches[0].clientX-_z.lx;_z.ty+=e.touches[0].clientY-_z.ly;
      _z.lx=e.touches[0].clientX;_z.ly=e.touches[0].clientY;
      clampTx();aIZ();
    }
  };
  vw.ontouchend=()=>{_z.dr=false;ltd=0;};
}

function aIZ(){
  const img=document.getElementById("vi"),vw=document.getElementById("ivw");
  if(!img)return;
  img.style.transform=`translate(${_z.tx}px,${_z.ty}px) scale(${_z.s})`;
  const pct=Math.round(_z.s*100);
  const el=document.getElementById("zl");if(el)el.textContent=pct+"%";
  vw.classList.toggle("zoomed",_z.s>1.05);
}

function adjH(){
  const vw=document.getElementById("ivw"),img=document.getElementById("vi");
  if(!vw||!img||!img.naturalWidth)return;
  const cw=vw.clientWidth;
  const baseW=Math.min(cw,img.naturalWidth);
  const baseH=baseW*(img.naturalHeight/img.naturalWidth);
  // At s=1, container = exactly the image height (capped at 60vh)
  // At s>1, container grows with zoom (capped at 80vh)
  const fitH=Math.min(baseH,window.innerHeight*0.6);
  const h=Math.min(fitH*_z.s,window.innerHeight*0.8);
  vw.style.height=Math.round(Math.max(150,h))+"px";
}

function zm(f){
  const vw=document.getElementById("ivw"),img=document.getElementById("vi");
  if(!vw||!img||!img.naturalWidth)return;
  if(f===1){_z.s=1;_z.tx=0;_z.ty=0;adjH();aIZ();return;}
  _z.s=Math.max(1,Math.min(ZMAX,_z.s*f));_z.tx=0;_z.ty=0;clampTx();adjH();aIZ();
}

  Support:()=>supports.map(x=>[x.SupportID,x.Support]),
  Format:()=>[["","—"],...formats.map(x=>[x.FormatID,x.Format])],
  ContactID:()=>contacts.map(x=>[x.ContactID,`${x.NomInstitution}${x.Nom?" ("+x.Nom+")":""}`]),
};
const BULK_BOOL=["Exposable","Catalogué"];
const BULK_NUM=["Prix"];

function renderBulkValue(){
  const f=document.getElementById("beField")?.value;
  const w=document.getElementById("beValueWrap");
  if(!w)return;
  const S2="font-family:inherit;font-size:9px;background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:3px 6px;outline:none";
  if(BULK_FIELDS_MAP[f]){
    const opts=BULK_FIELDS_MAP[f]().map(([v,l])=>`<option value="${v}">${esc(String(l))}</option>`).join("");
    w.innerHTML=`<select id="beVal" style="${S2}"><option value="">—</option>${opts}</select>`;
  }else if(BULK_BOOL.includes(f)){
    w.innerHTML=`<select id="beVal" style="${S2}"><option value="true">Oui</option><option value="false">Non</option></select>`;
  }else if(BULK_NUM.includes(f)){
    w.innerHTML=`<input id="beVal" type="number" style="${S2};width:80px">`;
  }else if(f==="Tirage"){
    w.innerHTML=`<input id="beVal" type="text" style="${S2};width:80px">`;
  }else{w.innerHTML="";}
}

async function bulkEdit(){
  const ids=[...exSelected];
  if(!ids.length){tst("Aucune sélection",true);return;}
  const f=document.getElementById("beField")?.value;
  if(!f){tst("Choisir un champ",true);return;}
  const valEl=document.getElementById("beVal");
  if(!valEl){tst("Choisir une valeur",true);return;}
  const val=valEl.value;
  const data={};
  if(BULK_BOOL.includes(f))data[f]=val==="true";
  else if(BULK_NUM.includes(f))data[f]=Number(val)||0;
  else if(BULK_FIELDS_MAP[f])data[f]=val?Number(val):null;
  else data[f]=val||null;
  if(!confirm(`Appliquer "${f}" à ${ids.length} œuvres ?`))return;
  try{
    await api(`Oeuvres?OeuvreID=in.(${ids.join(",")})`,{method:"PATCH",body:JSON.stringify(data)});
    oeuvres.forEach(o=>{if(exSelected.has(o.OeuvreID))Object.assign(o,data);});
    tst(`${ids.length} œuvres mises à jour`);
    renderExGrid();
  }catch(e){tst("Erreur: "+e.message,true);}
}

function exMatch(o,c){
  const fld=EX_FIELDS.find(f=>f.k===c.field);if(!fld)return true;
  const raw=o[c.field];const val=raw!=null?String(raw):"";const cv=c.value||"";
  // For date fields: compare year portion
  const numVal=fld.t==="date"?(val?Number(val.slice(0,4)):0):Number(val);
  const numCv=Number(cv);
  switch(c.op){
    case "contient":return val.toLowerCase().includes(cv.toLowerCase());
    case "ne contient pas":return !val.toLowerCase().includes(cv.toLowerCase());
    case "=":return val===cv;
    case "≠":return val!==cv;
    case ">":return (fld.t==="date"?numVal:Number(val))>numCv;
    case "<":return (fld.t==="date"?numVal:Number(val))<numCv;
    case "≥":return (fld.t==="date"?numVal:Number(val))>=numCv;
    case "≤":return (fld.t==="date"?numVal:Number(val))<=numCv;
    case "est vide":return !raw&&raw!==0&&raw!==false;
    case "n'est pas vide":return raw!=null&&raw!=="";
    case "= vrai":return raw===true;
    case "= faux":return !raw;
    default:return true;
  }
}

function runExFilter(){
  exFiltered=oeuvres.filter(o=>exCrit.every(c=>exMatch(o,c)));
  // Start with none selected
  exSelected=new Set();
  updateExCnt();renderExGrid();
}

function exSelByIds(){
  const raw=document.getElementById("exIdInput")?.value||"";
  if(!raw.trim()){tst("Entrer des IDs",true);return;}
  const ids=new Set();
  raw.split(",").forEach(part=>{
    part=part.trim();
    const range=part.match(/^(\d+)\s*[-–]\s*(\d+)$/);
    if(range){
      const a=parseInt(range[1]),b=parseInt(range[2]);
      for(let i=Math.min(a,b);i<=Math.max(a,b);i++)ids.add(i);
    }else if(/^\d+$/.test(part)){
      ids.add(parseInt(part));
    }
  });
  // Select matching oeuvres (add to existing selection)
  let added=0;
  oeuvres.forEach(o=>{if(ids.has(o.OeuvreID)){exSelected.add(o.OeuvreID);added++;}});
  tst(`${added} oeuvres sélectionnées par ID`);
  updateExCnt();renderExGrid();
}

let exShowAll=false, exPageSize=0;
let exDispFields={titre:true,id:true,technique:true,annee:true,support:false,dims:false,prix:false,contact:false,exposable:false,tirage:false};

function exSortItems(items){
  const s=document.getElementById("exSort")?.value||"id_desc";
  const cpy=[...items];
  switch(s){
    case "id_desc":cpy.sort((a,b)=>b.OeuvreID-a.OeuvreID);break;
    case "id_asc":cpy.sort((a,b)=>a.OeuvreID-b.OeuvreID);break;
    case "year_desc":cpy.sort((a,b)=>(b["Année"]||"").localeCompare(a["Année"]||""));break;
    case "year_asc":cpy.sort((a,b)=>(a["Année"]||"").localeCompare(b["Année"]||""));break;
    case "title_asc":cpy.sort((a,b)=>(a.Titre||"").localeCompare(b.Titre||""));break;
    case "tech":cpy.sort((a,b)=>(tM[a.Technique]||"").localeCompare(tM[b.Technique]||""));break;
    case "prix_desc":cpy.sort((a,b)=>(b.Prix||0)-(a.Prix||0));break;
  }
  return cpy;
}

function buildLabel(o){
  const d=dm(o);const parts=[];
  if(exDispFields.titre)parts.push(`<div class="gt">${esc(o.Titre||"S/T")}</div>`);
  const sub=[];
  if(exDispFields.id)sub.push(o.OeuvreID);
  if(exDispFields.technique)sub.push(tM[o.Technique]||"—");
  if(exDispFields.annee)sub.push(o["Année"]?String(o["Année"]).slice(0,4):"—");
  if(exDispFields.support)sub.push(sM[o.Support]||"");
  if(exDispFields.dims&&d.h&&d.l)sub.push(`${d.h}×${d.l}`);
  if(exDispFields.prix&&o.Prix>0)sub.push(`${o.Prix}€`);
  if(exDispFields.contact&&cM[o.ContactID])sub.push(cM[o.ContactID]);
  if(exDispFields.exposable)sub.push(o.Exposable?"Exp":"");
  if(exDispFields.tirage&&o.Tirage&&o.Tirage!=="1/1")sub.push(o.Tirage);
  if(sub.length)parts.push(`<div class="gs">${sub.filter(Boolean).join(" · ")}</div>`);
  return parts.join("");
}

function updateExSummary(){
  const el=document.getElementById("exSummary");if(!el)return;
  const selItems=exFiltered.filter(o=>exSelected.has(o.OeuvreID));
  if(!selItems.length){el.textContent="Aucune sélection";return;}
  // Count by technique
  const byTech={};selItems.forEach(o=>{const t=tM[o.Technique]||"?";byTech[t]=(byTech[t]||0)+1;});
  const techStr=Object.entries(byTech).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`${t}: ${n}`).join(" · ");
  // Count with/without image
  const withImg=selItems.filter(o=>o.txtImageNameLink).length;
  el.textContent=`Sélection: ${selItems.length} oeuvres · ${withImg} avec image · ${techStr}`;
}

  let items=exShowAll?exFiltered:exFiltered.filter(o=>o.txtImageNameLink);

  const thumbSize=exCols<=4?150:exCols<=8?100:80;
  
  el.innerHTML=items.map(o=>{
    const u=iuThumb(o.txtImageNameLink,thumbSize),sel=exSelected.has(o.OeuvreID);
    return`<div class="gc ${sel?'selected':''}" style="position:relative" data-oid="${o.OeuvreID}" onclick="toggleExSel(${o.OeuvreID})">

      ${u?`<img class="gi lazy" data-src="${u}" alt="">`:`<div class="ge">—</div>`}
      <div class="gn">${buildLabel(o)}${exItemNotes[o.OeuvreID]?`<div style="font-size:9px;color:var(--ac);margin-top:3px;font-style:italic;border-left:2px solid var(--ac);padding-left:4px;line-height:1.3">${esc(exItemNotes[o.OeuvreID])}</div>`:""}</div>
    </div>`;
  }).join("");
  if(exPageSize>0&&total>exPageSize){
    el.insertAdjacentHTML("beforeend",`<div style="grid-column:1/-1;text-align:center;padding:12px"><button class="exp-fmt" onclick="exPageSize+=48;renderExGrid()">Charger plus (${total-exPageSize} restantes)</button></div>`);
  }
  oL();
  updateExSummary();
}

// Cette fonction synchronise les oeuvres du canvas avec le champ 'theme' de la DB
async function updateThemeBeforeExport() {
    const exTitle = document.querySelector('#exName')?.value || exSelName || "";
    if(!exTitle) return;
    const ids = [...exSelected];
    if(ids.length === 0) return;
    try {
        const response = await fetch(`${SB}/rest/v1/Oeuvres?OeuvreID=in.(${ids.join(',')})`, {
            method: 'PATCH',
            headers: {'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal'},
            body: JSON.stringify({ theme: exTitle })
        });
        if (response.ok) {
            console.log(`DB: ${ids.length} oeuvres -> theme "${exTitle}"`);
            tst(`Theme "${exTitle}" -> ${ids.length} oeuvres`);
            ids.forEach(id=>{const o=oeuvres.find(x=>x.OeuvreID===id);if(o)o.theme=exTitle;});
        } else {
            tst("Erreur theme: " + await response.text(), true);
        }
    } catch (err) {
        tst("Erreur: " + err.message, true);
    }
}
  
async function loadJsPDF(){
  if(window.jspdf)return;
  return new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";s.onload=res;s.onerror=()=>rej(new Error("jsPDF load failed"));document.head.appendChild(s);});
}
async function imgToDataUrl(url,maxW,maxH){
  return new Promise(res=>{const img=new Image();img.crossOrigin="anonymous";img.onload=()=>{const sc=Math.min(maxW/img.naturalWidth,maxH/img.naturalHeight,1);const c=document.createElement("canvas");c.width=img.naturalWidth*sc;c.height=img.naturalHeight*sc;c.getContext("2d").drawImage(img,0,0,c.width,c.height);res({data:c.toDataURL("image/jpeg",0.8),w:c.width,h:c.height});};img.onerror=()=>res(null);img.src=url;});
}

async function exPDF(mode){
  await updateThemeBeforeExport();
  const items=getExSel();
  if(!items.length){tst("Aucune oeuvre sélectionnée",true);return;}
  const st=document.getElementById("exStat");
  st.textContent="Chargement jsPDF...";
  try{await loadJsPDF();}catch(e){st.textContent=e.message;return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:mode==="tableau"?"landscape":"portrait",unit:"mm",format:"a4"});
  const pw=doc.internal.pageSize.getWidth(),ph=doc.internal.pageSize.getHeight();
  const mg=12;
  const title=exSelName||"Sélection";
  const date=new Date().toLocaleDateString("fr-FR");

  // Title at top of first page
  doc.setFontSize(14);doc.setFont(undefined,"bold");
  doc.text(title,mg,mg+5);
  doc.setFontSize(8);doc.setFont(undefined,"normal");doc.setTextColor(120);
  doc.text(`${items.length} oeuvre${items.length>1?"s":""} · ${date} · Pierre Emmanuel Moulin`,mg,mg+11);
  if(exSelComment){doc.setFontSize(7);const cl=doc.splitTextToSize(exSelComment,pw-mg*2);doc.text(cl,mg,mg+16);}
  doc.setTextColor(0);
  // Start content below title block
  const contentY=mg+(exSelComment?26:18);

  if(mode==="fiche"){
    for(let i=0;i<items.length;i++){
      const o=items[i];if(i>0)doc.addPage();
      st.textContent=`Fiche ${i+1}/${items.length}`;
      let y=i===0?contentY:mg;
      if(o.txtImageNameLink){
        const img=await imgToDataUrl(iu(o.txtImageNameLink),800,800);
        if(img){const sc=Math.min((pw-mg*2)/img.w,(ph*0.5)/img.h);doc.addImage(img.data,"JPEG",mg,y,img.w*sc,img.h*sc);y+=img.h*sc+6;}
      }
      doc.setFontSize(16);doc.setFont(undefined,"bold");doc.text(o.Titre||"Sans titre",mg,y);y+=7;
      doc.setFontSize(9);doc.setFont(undefined,"normal");
      const d=dm(o);
      [`ID ${o.OeuvreID} · ${o.Tirage||"1/1"}`,`${tM[o.Technique]||"—"} sur ${sM[o.Support]||"—"}`,o["Année"]?String(o["Année"]).slice(0,4):"",d.h&&d.l?`${d.h} × ${d.l} cm`:"",o.Prix>0?`${o.Prix} €`:"",o.Exposable?"Exposable":"",o.Commentaires?`Notes: ${o.Commentaires.slice(0,200)}`:""].filter(Boolean).forEach(l=>{doc.text(l,mg,y);y+=4.5;});
      // Per-item note
      if(exItemNotes[o.OeuvreID]){y+=3;doc.setFontSize(8);doc.setTextColor(150);
        const nLines=doc.splitTextToSize(`Note: ${exItemNotes[o.OeuvreID]}`,pw-mg*2);
        doc.text(nLines,mg,y);doc.setTextColor(0);
      }
      doc.setFontSize(7);doc.setTextColor(150);doc.text(`© PEM · ${title}`,mg,ph-6);doc.setTextColor(0);
    }
  }
  else if(mode==="grille"){
    const cols=Number(document.getElementById("exPdfCols")?.value||4);
    // Adaptive resolution: fewer cols = higher res per image
    const imgRes=cols<=2?600:cols<=4?300:200;
    const cellW=(pw-mg*2)/cols,imgH=cellW*1.2,baseLabelH=12,noteLabelH=6;
    let x=mg,y=contentY,col=0;
    for(let i=0;i<items.length;i++){
      const o=items[i];st.textContent=`Grille ${i+1}/${items.length}`;
      const hasNote=!!exItemNotes[o.OeuvreID];
      const cellH=imgH+baseLabelH+(hasNote?noteLabelH:0);
      if(y+cellH>ph-mg){doc.addPage();x=mg;y=mg;col=0;}
      if(o.txtImageNameLink){
        const imgUrl=cols<=2?iu(o.txtImageNameLink):iuThumb(o.txtImageNameLink,imgRes);
        const img=await imgToDataUrl(imgUrl,imgRes,imgRes);
        if(img){const sc=Math.min((cellW-4)/img.w,imgH/img.h);const iw=img.w*sc,ih=img.h*sc;doc.addImage(img.data,"JPEG",x+(cellW-iw)/2,y,iw,ih);}
      }
      doc.setFontSize(6);doc.setFont(undefined,"bold");doc.text(`${o.OeuvreID}`,x+1,y+imgH+4);
      doc.setFont(undefined,"normal");doc.text((o.Titre||"S/T").slice(0,25),x+10,y+imgH+4);
      doc.setFontSize(5);doc.setTextColor(120);doc.text(`${tM[o.Technique]||""} ${o["Année"]?String(o["Année"]).slice(0,4):""}`,x+1,y+imgH+8);doc.setTextColor(0);
      if(hasNote){
        doc.setFontSize(4.5);doc.setTextColor(180,120,40);
        doc.text(exItemNotes[o.OeuvreID].slice(0,40),x+1,y+imgH+11,{maxWidth:cellW-4});
        doc.setTextColor(0);
      }
      col++;x+=cellW;
      if(col>=cols){col=0;x=mg;y+=imgH+baseLabelH+(hasNote?noteLabelH:0);}
    }
    // Footer on last page
    doc.setFontSize(6);doc.setTextColor(150);doc.text(`© PEM · ${title} · ${items.length} oeuvres`,mg,ph-5);doc.setTextColor(0);
  }
  else if(mode==="tableau"){
    const hdrs=["ID","Titre","Technique","Support","Année","H","L","Prix","Exp"];
    const cw=[12,55,28,22,16,12,12,16,10];
    let y=contentY;
    function drawHdr(){let x=mg;doc.setFontSize(7);doc.setFont(undefined,"bold");hdrs.forEach((h,i)=>{doc.text(h,x,y);x+=cw[i];});y+=4;doc.setFont(undefined,"normal");doc.setFontSize(6.5);}
    drawHdr();
    for(const o of items){
      if(y>ph-mg){doc.addPage();y=mg+4;drawHdr();}
      let x=mg;const d=dm(o);
      [String(o.OeuvreID),(o.Titre||"").slice(0,35),tM[o.Technique]||"",sM[o.Support]||"",o["Année"]?String(o["Année"]).slice(0,4):"",d.h||"",d.l||"",o.Prix>0?String(o.Prix):"",o.Exposable?"✓":""].forEach((v,i)=>{doc.text(v,x,y,{maxWidth:cw[i]-2});x+=cw[i];});
      y+=3.5;
      if(exItemNotes[o.OeuvreID]){
        doc.setFontSize(5.5);doc.setTextColor(180,120,40);doc.setFont(undefined,"italic");
        doc.text(`→ ${exItemNotes[o.OeuvreID].slice(0,80)}`,mg+12,y);
        doc.setFont(undefined,"normal");doc.setTextColor(0);doc.setFontSize(6.5);
        y+=3;
      }
    }
  }
  const safeName=(exSelName||"selection").replace(/[^a-zA-Z0-9_-]/g,"_").slice(0,30);
  doc.save(`PEM_${safeName}_${mode}_${items.length}.pdf`);
  st.textContent=`✓ ${items.length} oeuvres exportées`;tst(`PDF ${mode}`);
  setTimeout(()=>clearExSelection(),800);
}
