<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM — Inventaire & Clusters</title>
<style>
/* --- VOS STYLES ORIGINAUX (CONSERVÉS À 100%) --- */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a1a;--sf:#242424;--bd:#333;--tx:#e0e0e0;--mt:#888;--ac:#c8a86e;--ad:#8a7040;--dg:#a04040;--wh:#fff;--bk:#000}
body{font-family:'JetBrains Mono','SF Mono','Consolas',monospace;background:var(--bg);color:var(--tx)}
#app{display:flex;flex-direction:column;height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf);position:sticky;top:0;z-index:100}
header h1{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--ac);text-transform:uppercase}
nav{display:flex;gap:2px}
nav button{font-family:inherit;padding:5px 10px;font-size:10px;border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase;background:transparent;color:var(--mt);transition:0.2s}
nav button.active{color:var(--ac);background:var(--bd)}
.body{flex:1;display:flex;overflow:hidden}
.sidebar{width:280px;min-width:280px;border-right:1px solid var(--bd);background:var(--sf);display:flex;flex-direction:column;flex-shrink:0}
.list{flex:1;overflow-y:auto}
.main{flex:1;overflow-y:auto;padding:16px;position:relative}

/* --- STYLES POUR LA ZONE CLUSTERS --- */
#clusters-zone { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:#0f0f0f; overflow:hidden; z-index:10; }
.cluster-region { position:absolute; border:1px dashed #444; border-radius:50%; width:200px; height:200px; display:flex; align-items:center; justify-content:center; color:#444; font-size:9px; pointer-events:none; }
.draggable-art { position:absolute; cursor:move; border:1px solid var(--bd); background:var(--sf); z-index:20; transition: box-shadow 0.2s; }
.draggable-art:hover { box-shadow: 0 0 10px var(--ac); }
.cluster-label { position:absolute; bottom:-20px; width:100%; text-align:center; color:var(--mt); }
</style>
</head>
<body>
<div id="app">
    <header>
        <h1 id="mt_title">PEM — INVENTAIRE</h1>
        <nav id="nv">
            <button class="active" onclick="sv('list')">Liste</button>
            <button onclick="sv('gallery')">Galerie</button>
            <button onclick="sv('clusters')">Clusters</button>
            <button onclick="sv('form')">+ Nouvelle</button>
            <button onclick="sv('export')">Export</button>
        </nav>
    </header>
    <div class="body">
        <aside class="sidebar" id="sb">
            <div class="filters" style="padding:10px; border-bottom:1px solid var(--bd)">
                <input type="text" id="q" placeholder="Recherche..." oninput="applyF()" style="width:100%; background:#000; color:#fff; border:1px solid var(--bd); padding:5px; font-size:11px;">
            </div>
            <div class="list" id="ls"></div>
        </aside>
        <main class="main" id="mn">
            <div id="content-actual"></div> 
            
            <div id="clusters-zone">
                <div id="cluster-canvas" style="width:100%; height:100%; position:relative;">
                    <div class="cluster-region" style="left:10%; top:20%;"><span>THÈME A</span></div>
                    <div class="cluster-region" style="left:40%; top:50%;"><span>TECHNIQUE</span></div>
                    <div class="cluster-region" style="left:70%; top:20%;"><span>COULEUR</span></div>
                </div>
            </div>
        </main>
    </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// CONFIGURATION (VOS IDENTIFIANTS)
const SB = "https://mcrzsxrcoexnlwmaunte.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo";
const supabase = createClient(SB, KEY);

let oeuvres = [], filtered = [], curV = "list";

async function load() {
    const { data } = await supabase.from('Oeuvres').select('*').order('OeuvreID', {ascending:false});
    oeuvres = data || [];
    applyF();
}

// NAVIGATION (Surcharge de votre sv(v) d'origine)
window.sv = function(v) {
    curV = v;
    const cz = document.getElementById('clusters-zone');
    const sb = document.getElementById('sb');
    const ca = document.getElementById('content-actual');
    
    // Reset
    document.querySelectorAll('#nv button').forEach(b => b.classList.remove('active'));
    cz.style.display = 'none';
    sb.style.display = 'flex';
    ca.style.display = 'block';

    if (v === 'clusters') {
        cz.style.display = 'block';
        sb.style.display = 'none';
        ca.style.display = 'none';
        initManualClusters();
    }
    
    // Logique pour mettre le bouton en surbrillance
    const btn = Array.from(document.querySelectorAll('#nv button')).find(b => b.innerText.toLowerCase().includes(v));
    if(btn) btn.classList.add('active');
}

// LOGIQUE CLUSTERS MANUELS
function initManualClusters() {
    const canvas = document.getElementById('cluster-canvas');
    // On ne vide pas tout pour garder les cercles, on retire juste les images précédentes
    document.querySelectorAll('.draggable-art').forEach(el => el.remove());

    // On affiche les 30 dernières oeuvres sur le côté pour que vous puissiez les placer
    oeuvres.slice(0, 30).forEach((o, i) => {
        const img = document.createElement('img');
        const thumb = `${SB}/storage/v1/object/public/paintings/${o.txtImageNameLink}?width=60&height=60&resize=contain`;
        img.src = thumb;
        img.className = 'draggable-art';
        img.style.left = `20px`;
        img.style.top = `${20 + (i * 45)}px`;
        img.style.width = '40px';
        img.title = o.Titre;
        
        makeDraggable(img);
        canvas.appendChild(img);
    });
}

function makeDraggable(el) {
    let px = 0, py = 0;
    el.onmousedown = dragMouseDown;

    function dragMouseDown(e) {
        e.preventDefault();
        px = e.clientX;
        py = e.clientY;
        document.onmouseup = closeDragElement;
        document.onmousemove = elementDrag;
    }

    function elementDrag(e) {
        e.preventDefault();
        let nx = px - e.clientX;
        let ny = py - e.clientY;
        px = e.clientX;
        py = e.clientY;
        el.style.top = (el.offsetTop - ny) + "px";
        el.style.left = (el.offsetLeft - nx) + "px";
    }

    function closeDragElement() {
        document.onmouseup = null;
        document.onmousemove = null;
    }
}

// FONCTION DE RECHERCHE D'ORIGINE
window.applyF = function() {
    const q = document.getElementById('q').value.toLowerCase();
    filtered = oeuvres.filter(o => (o.Titre || "").toLowerCase().includes(q));
    renderList();
}

function renderList() {
    const ls = document.getElementById('ls');
    ls.innerHTML = filtered.map(o => `
        <div style="padding:10px; border-bottom:1px solid #333; cursor:pointer; font-size:11px;" onclick="console.log(${o.OeuvreID})">
            ${o.Titre || 'Sans titre'}
        </div>
    `).join('');
}

window.onload = load;
</script>
</body>
</html>
