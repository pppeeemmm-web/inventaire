<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PEM — Map Engine v7 (Absolute Relative)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111;--sf:#1a1a1a;--bd:#333;--tx:#eee;--ac:#c8a86e;--dg:#ff4444}
body{font-family:monospace;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh}

#app{display:flex;height:100vh}

/* --- SIDEBAR BEEHIVE --- */
.sidebar { width: 300px; background: var(--sf); border-right: 1px solid var(--bd); display: flex; flex-direction: column; z-index: 100;}
.filters { padding: 15px; border-bottom: 1px solid var(--bd); }
.filters input { width: 100%; background: #000; border: 1px solid var(--bd); color: var(--ac); padding: 10px; outline: none; }

.list { 
    flex: 1; overflow-y: auto; padding: 10px; 
    display: flex; flex-wrap: wrap; align-content: flex-start;
}
.list-item { width: 50px; height: 50px; cursor: grab; margin: 2px; }
.thumb { width: 50px; height: 50px; border-radius: 50%; border: 1px solid #444; object-fit: cover; }

/* --- CANVAS --- */
.viewport { flex: 1; position: relative; overflow: hidden; background: #0a0a0a; }
#canvas {
    position: absolute; width: 8000px; height: 8000px; transform-origin: 0 0;
    background-image: radial-gradient(#222 1px, transparent 1px); background-size: 50px 50px;
}

/* --- NODES (80px Max) --- */
.node { position: absolute; z-index: 10; user-select: none; }
.art-node { width: 80px; height: 80px; transform-origin: center center; }
.art-node img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--ac); display: block; pointer-events: none; }
.id-tag { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); font-size: 9px; background: #000; color: var(--ac); padding: 1px 4px; border: 1px solid var(--ac); border-radius: 3px; pointer-events: none;}

.zone-node { border: 2px dashed #555; border-radius: 50%; background: rgba(200,168,110,0.03); display: flex; align-items: center; justify-content: center; }
.zone-node input { background: transparent; border: none; color: #777; text-align: center; width: 80%; outline: none; font-weight: bold; }

.ui-top { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
.btn { background: var(--sf); color: var(--tx); border: 1px solid var(--bd); padding: 8px 15px; cursor: pointer; font-size: 11px; }
#trash { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--dg); color: var(--dg); display: none; align-items: center; justify-content: center; z-index: 2000; background: #000; font-size: 24px; }
</style>
</head>
<body>

<div id="app">
    <aside class="sidebar">
        <div class="filters"><input type="text" id="q" placeholder="RECHERCHER ID..." oninput="renderSidebar()"></div>
        <div class="list" id="ls"></div>
    </aside>

    <main class="viewport" id="v">
        <div class="ui-top">
            <span id="zVal" style="color:var(--ac)">100%</span>
            <button class="btn" onclick="addZone()">+ CERCLE</button>
            <button class="btn" onclick="saveMap()">SAUVEGARDER</button>
        </div>
        <div id="canvas"></div>
        <div id="trash">×</div>
    </main>
</div>

<script>
const SB="https://mcrzsxrcoexnlwmaunte.supabase.co", BKT="paintings";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo";

let oeuvres = [], scale = 1, px = 0, py = 0;
const canvas = document.getElementById('canvas');
const viewport = document.getElementById('v');

async function init() {
    const r = await fetch(`${SB}/rest/v1/Oeuvres?select=OeuvreID,txtImageNameLink&apikey=${KEY}`, { headers: { apikey: KEY } });
    oeuvres = await r.json();
    renderSidebar();
    loadMap();
    updateTransform();
}

function renderSidebar() {
    const q = document.getElementById('q').value;
    const filtered = oeuvres.filter(o => String(o.OeuvreID).includes(q));
    document.getElementById('ls').innerHTML = filtered.map(o => `
        <div class="list-item" draggable="true" ondragstart="onDS(event, '${o.txtImageNameLink}', ${o.OeuvreID})">
            <img class="thumb" src="${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(o.txtImageNameLink)}?width=100&height=100&resize=cover">
        </div>`).join('');
}

function updateTransform() {
    canvas.style.transform = `translate(${px}px, ${py}px) scale(${scale})`;
    document.getElementById('zVal').textContent = Math.round(scale * 100) + "%";
    
    // Contrainte 80px : si on zoom trop, on scale down l'item pour qu'il reste à 80px écran
    const sFix = scale > 1 ? (1 / scale) : 1; 
    document.querySelectorAll('.art-node').forEach(n => n.style.transform = `scale(${sFix})`);
}

viewport.onwheel = e => {
    e.preventDefault();
    const ns = Math.min(Math.max(scale * (e.deltaY > 0 ? 0.9 : 1.1), 0.02), 5);
    const r = viewport.getBoundingClientRect();
    px = (e.clientX - r.left) - ((e.clientX - r.left) - px) * (ns / scale);
    py = (e.clientY - r.top) - ((e.clientY - r.top) - py) * (ns / scale);
    scale = ns;
    updateTransform();
};

function onDS(e, img, id) { e.dataTransfer.setData("img", img); e.dataTransfer.setData("id", id); }

viewport.ondragover = e => e.preventDefault();
viewport.ondrop = e => {
    e.preventDefault();
    const img = e.dataTransfer.getData("img");
    const id = e.dataTransfer.getData("id");
    if(!img) return;
    const r = canvas.getBoundingClientRect();
    createNode(img, id, (e.clientX - r.left)/scale - 40, (e.clientY - r.top)/scale - 40);
};

function createNode(img, id, x, y) {
    const div = document.createElement('div');
    div.className = 'node art-node';
    div.dataset.img = img; div.dataset.id = id;
    div.style.left = x + 'px'; div.style.top = y + 'px';
    div.innerHTML = `<img src="${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(img)}?width=160&height=160&resize=cover"><div class="id-tag">${id}</div>`;
    bindNode(div);
    canvas.appendChild(div);
    updateTransform();
}

function bindNode(el) {
    let mX, mY, iX, iY;

    el.onmousedown = e => {
        if(e.target.tagName === 'INPUT') return;
        e.preventDefault(); e.stopPropagation();
        
        // On mémorise l'état au moment du clic
        mX = e.clientX; 
        mY = e.clientY;
        iX = parseFloat(el.style.left);
        iY = parseFloat(el.style.top);

        document.getElementById('trash').style.display = 'flex';
        el.style.zIndex = 2000;

        const move = e => {
            // Le mouvement est l'écart souris divisé par le zoom, ajouté à la position initiale
            el.style.left = (iX + (e.clientX - mX) / scale) + "px";
            el.style.top = (iY + (e.clientY - mY) / scale) + "px";
        };

        const up = e => {
            window.removeEventListener('mousemove', move);
            window.removeEventListener('mouseup', up);
            document.getElementById('trash').style.display = 'none';
            el.style.zIndex = 10;
            const t = document.getElementById('trash').getBoundingClientRect();
            if(e.clientX > t.left && e.clientY > t.top) el.remove();
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
    };
}

let isPan = false, sx, sy;
viewport.onmousedown = e => { if(e.target === viewport || e.target === canvas) { isPan = true; sx = e.clientX - px; sy = e.clientY - py; } };
window.onmousemove = e => { if(isPan) { px = e.clientX - sx; py = e.clientY - sy; updateTransform(); } };
window.onmouseup = () => isPan = false;

function addZone(w=400, h=400, x=500, y=500, txt="GROUPE") {
    const div = document.createElement('div');
    div.className = 'node zone-node';
    div.style.width = w+'px'; div.style.height = h+'px';
    div.style.left = x+'px'; div.style.top = y+'px';
    div.innerHTML = `<input type="text" value="${txt}">`;
    bindNode(div);
    canvas.appendChild(div);
}

function saveMap() {
    const d = {
        n: Array.from(document.querySelectorAll('.art-node')).map(n => ({x: n.style.left, y: n.style.top, img: n.dataset.img, id: n.dataset.id})),
        z: Array.from(document.querySelectorAll('.zone-node')).map(z => ({x: z.style.left, y: z.style.top, w: z.style.width, h: z.style.height, t: z.querySelector('input').value}))
    };
    localStorage.setItem('pem_map_final', JSON.stringify(d));
    alert("Map Sauvegardée");
}

function loadMap() {
    const raw = localStorage.getItem('pem_map_final');
    if(!raw) return;
    const d = JSON.parse(raw);
    d.n.forEach(n => createNode(n.img, n.id, parseFloat(n.x), parseFloat(n.y)));
    d.z.forEach(z => addZone(parseFloat(z.w), parseFloat(z.h), parseFloat(z.x), parseFloat(z.y), z.t));
}

init();
</script>
</body>
</html>
