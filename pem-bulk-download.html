<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PEM — Bulk Download</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono','Consolas',monospace;background:#1a1a1a;color:#e0e0e0;padding:20px}
h1{font-size:15px;font-weight:700;color:#c8a86e;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.btn{font-family:inherit;padding:8px 16px;font-size:11px;font-weight:600;border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase;margin:4px}
.bp{background:#c8a86e;color:#000}.bs{background:#242424;color:#e0e0e0;border:1px solid #333}
#log{background:#000;border:1px solid #333;padding:12px;font-size:10px;max-height:400px;overflow-y:auto;white-space:pre-wrap;margin-top:12px}
.ok{color:#4a8a4a}.err{color:#a04040}.wrn{color:#cc8800}
#progress{margin:12px 0;height:20px;background:#242424;border:1px solid #333;position:relative}
#progressBar{height:100%;background:#c8a86e;transition:width 0.3s}
#progressText{position:absolute;top:0;left:0;right:0;text-align:center;font-size:9px;line-height:20px;color:#fff}
.info{font-size:10px;color:#888;margin:8px 0;line-height:1.6}
</style>
</head>
<body>
<h1>PEM — Bulk Download</h1>
<p class="info">
  Télécharge tous les fichiers du bucket en ZIP.<br>
  ⚠ Avec 1084 fichiers (~3GB), le téléchargement prendra du temps et beaucoup de RAM.<br>
  Option : télécharger par lots de 100 fichiers pour éviter les crashs mémoire.
</p>
<div>
  <button class="btn bp" onclick="startDownload('all')">Tout télécharger (1 ZIP)</button>
  <button class="btn bs" onclick="startDownload('batch')">Par lots de 100</button>
  <button class="btn bs" onclick="startDownload('list')">Liste seulement (CSV)</button>
</div>
<div id="progress" style="display:none"><div id="progressBar" style="width:0"></div><div id="progressText"></div></div>
<div id="log" style="display:none"></div>

<script>
const SB="https://mcrzsxrcoexnlwmaunte.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo";
const BKT="paintings";

function log(msg,cls){
  const el=document.getElementById("log");
  el.style.display="block";
  el.innerHTML+=`<span class="${cls||""}">${msg}</span>\n`;
  el.scrollTop=el.scrollHeight;
}

function progress(cur,total,label){
  const el=document.getElementById("progress");
  el.style.display="block";
  document.getElementById("progressBar").style.width=`${(cur/total*100).toFixed(1)}%`;
  document.getElementById("progressText").textContent=`${label||""} ${cur}/${total} (${(cur/total*100).toFixed(0)}%)`;
}

async function listAll(){
  let all=[],offset=0;
  while(true){
    const r=await fetch(`${SB}/storage/v1/object/list/${BKT}`,{
      method:"POST",
      headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
      body:JSON.stringify({prefix:"",limit:1000,offset,sortBy:{column:"name",order:"asc"}})
    });
    if(!r.ok)throw new Error(`List ${r.status}`);
    const items=await r.json();
    if(!items.length)break;
    all=all.concat(items.filter(f=>f.name&&f.id));
    if(items.length<1000)break;
    offset+=items.length;
  }
  return all;
}

async function startDownload(mode){
  log("Listing des fichiers...");
  const files=await listAll();
  log(`${files.length} fichiers trouvés`,"ok");
  
  if(mode==="list"){
    // Just export a CSV list
    let csv="name,size,type,created\n";
    files.forEach(f=>{
      csv+=`"${f.name}",${f.metadata?.size||0},"${f.metadata?.mimetype||""}","${f.created_at||""}"\n`;
    });
    const blob=new Blob([csv],{type:"text/csv"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="pem_bucket_files.csv";
    a.click();
    log("CSV téléchargé","ok");
    return;
  }
  
  if(mode==="all"){
    await downloadZip(files,0,files.length,"pem_paintings_all");
  }else{
    // Batch mode: download in chunks of 100
    const batchSize=100;
    for(let i=0;i<files.length;i+=batchSize){
      const batch=files.slice(i,i+batchSize);
      const batchNum=Math.floor(i/batchSize)+1;
      const totalBatches=Math.ceil(files.length/batchSize);
      log(`\n── Lot ${batchNum}/${totalBatches} (${batch.length} fichiers) ──`);
      await downloadZip(batch,i,files.length,`pem_paintings_${String(batchNum).padStart(2,"0")}`);
    }
    log(`\n✓ Terminé: ${Math.ceil(files.length/100)} fichiers ZIP créés`,"ok");
  }
}

async function downloadZip(files,startIdx,total,zipName){
  const zip=new JSZip();
  let ok=0,err=0;
  
  for(let i=0;i<files.length;i++){
    const f=files[i];
    progress(startIdx+i+1,total,f.name.slice(0,30));
    
    try{
      const url=`${SB}/storage/v1/object/public/${BKT}/${encodeURIComponent(f.name)}`;
      const r=await fetch(url);
      if(!r.ok)throw new Error(`${r.status}`);
      const blob=await r.blob();
      zip.file(f.name,blob);
      ok++;
    }catch(e){
      log(`✕ ${f.name}: ${e.message}`,"err");
      err++;
    }
  }
  
  log(`Compression ZIP... (${ok} fichiers)`);
  progress(total,total,"Compression...");
  
  const content=await zip.generateAsync({type:"blob",compression:"STORE"},meta=>{
    progress(Math.round(meta.percent),100,"ZIP: "+Math.round(meta.percent)+"%");
  });
  
  const a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download=`${zipName}.zip`;
  a.click();
  
  // Free memory
  URL.revokeObjectURL(a.href);
  
  log(`✓ ${zipName}.zip — ${ok} fichiers, ${err} erreurs, ${(content.size/1024/1024).toFixed(0)}MB`,"ok");
}
</script>
</body>
</html>
