<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM — Inventaire & Clusters</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
/* --- TES STYLES ORIGINAUX (CONSERVÉS) --- */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a1a;--sf:#242424;--bd:#333;--tx:#e0e0e0;--mt:#888;--ac:#c8a86e;--ad:#8a7040;--dg:#a04040;--wh:#fff;--bk:#000}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--tx);overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf);z-index:100}
header h1{font-size:11px;letter-spacing:2px;color:var(--ac);text-transform:uppercase}
nav button{background:none;border:none;color:var(--mt);padding:5px 10px;cursor:pointer;font-size:10px;text-transform:uppercase;letter-spacing:1px}
nav button.active{color:var(--ac);background:var(--bd)}
.body{flex:1;display:flex;overflow:hidden}
.sidebar{width:280px;min-width:280px;border-right:1px solid var(--bd);background:var(--sf);display:flex;flex-direction:column;flex-shrink:0}
.list{flex:1;overflow-y:auto}
.main{flex:1;position:relative;overflow:hidden;background:#0d0d0d}

/* --- SYSTÈME DE CLUSTERS (AJOUTÉ) --- */
.cluster-region { position:absolute; border:1px dashed #444; border-radius:50%; width:200px; height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:move; z-index:5; }
.cluster-region input { background:transparent; border:none; color:var(--ac); text-align:center; font-family:inherit; font-size:10px; outline:none; width:80%; pointer-events:auto; }
.draggable-art { position:absolute; cursor:move; border:1px solid var(--bd); z-index:10; background:var(--bg); box-shadow: 4px 4px 15px rgba(0,0,0,0.5); }
.controls-cluster { position:absolute; top:20px; right:20px; z-index:1000; }
.btn-c { background:var(--ac); color:var(--bk); border:none; padding:10px 15px; font-size:10px; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>
<div id="app">
    <header>
        <h1>PEM <span id="vtitle">/ INVENTAIRE</span></h1>
        <nav id="nv">
            <button onclick="sv('list')" id="b-list" class="active">Liste</button>
            <button onclick="sv('clusters')" id="b-clusters">Clusters</button>
            <button onclick="sv('gallery')" id="b-gallery">Galerie</button>
        </nav>
    </header>
    <div class="body">
        <aside class="sidebar" id="sb">
            <div style="padding:10px; border-bottom:1px solid var(--bd)">
                <input type="text" id="q" placeholder="RECHERCHER..." oninput="applyF()" style="width:100%; background:#000; border:1px solid var(--bd); color:#fff; padding:8px; font-size:11px; outline:none;">
            </div>
            <div class="list" id="ls"></div>
        </aside>
        <main class="main" id="mn">
            <div class="controls-cluster" id="cluster-ui" style="display:none">
                <button class="btn-c" onclick="addRegion()">+ AJOUTER CERCLE</button>
            </div>
            
            <div id="cluster-space" style="width:100%; height:100%; position:relative;"></div>
        </main>
    </div>
</div>

<script>
// --- CONFIGURATION SUPABASE ---
const SB_URL = "https://mcrzsxrcoexnlwmaunte.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo";
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

let oeuvres = [], filtered = [], curV = 'list';

async function load() {
    const { data } = await supabase.from('Oeuvres').select('*').order('OeuvreID', {ascending:false});
    oeuvres = data || [];
    applyF();
}

// Fonction de filtrage (Sidebar)
function applyF() {
    const q = document.getElementById('q').value.toLowerCase();
    filtered = oeuvres.filter(o => (o.Titre || "").toLowerCase().includes(q));
    renderList();
}

// Rendu de la liste (Sidebar)
function renderList() {
    const ls = document.getElementById('ls');
    ls.innerHTML = filtered.map(o => `
        <div style="padding:12px; border-bottom:1px solid #222; cursor:pointer; font-size:11px;" 
             onclick="handleListClick(${o.OeuvreID}, '${o.txtImageNameLink}', '${o.Titre ? o.Titre.replace(/'/g, "\\'") : 'Sans Titre'}')">
            <span style="color:#555; margin-right:8px;">#${o.OeuvreID}</span> ${o.Titre || 'SANS TITRE'}
        </div>
    `).join('');
}

// --- LOGIQUE CLUSTER ---

function handleListClick(id, imgName, titre) {
    if (curV === 'clusters') {
        // Si on est dans l'onglet Clusters, on fait apparaître l'image au centre
        const space = document.getElementById('cluster-space');
        const img = document.createElement('img');
        img.src = `${SB_URL}/storage/v1/object/public/paintings/${imgName}?width=150`;
        img.className = 'draggable-art';
        img.style.left = '50px';
        img.style.top = '50px';
        img.style.width = '100px';
        img.title = titre;
        
        makeDraggable(img);
        space.appendChild(img);
    } else {
        // Mode normal : tu peux ici appeler ta fonction de détail
        console.log("Détail de l'oeuvre :", id);
    }
}

// Ajouter un cercle thématique
function addRegion() {
    const space = document.getElementById('cluster-space');
    const div = document.createElement('div');
    div.className = 'cluster-region';
    div.style.left = '300px';
    div.style.top = '200px';
    div.innerHTML = `<input type="text" placeholder="NOM DU THÈME" onclick="this.focus()">`;
    
    makeDraggable(div);
    space.appendChild(div);
}

// Switcher de vue
function sv(v) {
    curV = v;
    // Boutons navigation
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('b-' + v).classList.add('active');
    
    // Affichage des outils de cluster
    document.getElementById('cluster-ui').style.display = (v === 'clusters') ? 'block' : 'none';
}

// Fonction universelle de Drag & Drop
function makeDraggable(el) {
    let px = 0, py = 0;
    el.onmousedown = e => {
        if(e.target.tagName === 'INPUT') return; // Laisse l'input éditable
        e.preventDefault();
        px = e.clientX; py = e.clientY;
        document.onmousemove = e => {
            el.style.left = (el.offsetLeft - (px - e.clientX)) + "px";
            el.style.top = (el.offsetTop - (py - e.clientY)) + "px";
            px = e.clientX; py = e.clientY;
        };
        document.onmouseup = () => { document.onmousemove = null; };
    };
}

window.onload = load;
</script>
</body>
</html>
