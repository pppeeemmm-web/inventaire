<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM — Inventaire & Galaxie</title>
<script src="https://unpkg.com/force-graph"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
/* Vos styles originaux conservés */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a1a;--sf:#242424;--bd:#333;--tx:#e0e0e0;--mt:#888;--ac:#c8a86e;--ad:#8a7040;--dg:#a04040;--wh:#fff;--bk:#000}
body{font-family:'JetBrains Mono','SF Mono','Consolas',monospace;background:var(--bg);color:var(--tx)}
#app{display:flex;flex-direction:column;height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf);position:sticky;top:0;z-index:100}
header h1{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--ac);text-transform:uppercase}
nav{display:flex;gap:2px}
nav button{font-family:inherit;padding:5px 10px;font-size:10px;border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase;background:transparent;color:var(--mt)}
nav button.active{background:var(--ac);color:var(--bk);font-weight:700}

/* Nouveaux styles pour la Galaxie */
#galaxy-canvas { flex:1; background:#0b0b0b; cursor: move; }
.rel-manager { margin-top: 15px; padding: 10px; border: 1px solid var(--bd); background: rgba(200, 168, 110, 0.05); }
.rel-manager h4 { font-size: 10px; color: var(--ac); margin-bottom: 8px; text-transform: uppercase; }
.rel-manager select { width: 100%; background: var(--bg); color: var(--tx); border: 1px solid var(--bd); padding: 5px; font-size: 11px; margin-bottom: 5px; }

/* Styles originaux pour la structure */
.body{flex:1;display:flex;overflow:hidden}
.sidebar{width:280px;min-width:280px;border-right:1px solid var(--bd);background:var(--sf);display:flex;flex-direction:column;flex-shrink:0}
.list{flex:1;overflow-y:auto}
.main{flex:1;overflow-y:auto;padding:16px}
</style>
</head>
<body>
<div id="app">
    <header>
        <h1 id="main-title">PEM — INVENTAIRE</h1>
        <nav id="nv">
            <button class="active" onclick="sv('list')">Liste</button>
            <button onclick="sv('galaxy')">Galaxie</button>
            <button onclick="sv('gallery')">Galerie</button>
            <button onclick="sv('form')">+ Nouvelle</button>
        </nav>
    </header>
    <div id="debug"></div>
    <div class="body">
        <aside class="sidebar" id="sb">
            <div class="filters">
                <input type="text" id="q" placeholder="Recherche..." oninput="applyF()">
                <select id="fT" onchange="applyF()"><option value="">Toutes techniques</option></select>
                <select id="fS" onchange="applyF()"><option value="">Tous supports</option></select>
            </div>
            <div class="list" id="ls"></div>
            <div class="stats" id="st"></div>
        </aside>
        <main class="main" id="mn"></main>
    </div>
</div>

<script>
// Configuration extraite de votre code
const SB="https://mcrzsxrcoexnlwmaunte.supabase.co", 
      KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo",
      BKT="paintings",
      STR=`${SB}/storage/v1/object/public/${BKT}`;

const supabase = window.supabase ? window.supabase.createClient(SB, KEY) : null;
let oeuvres=[], techniques=[], supports=[], relations=[], filtered=[], selId=null, curV="list";

// --- CHARGEMENT ---
async function load() {
    try {
        // Ajout de tblRelations dans le Promise.all
        const [o, t, s, rels] = await Promise.all([
            apiAll("Oeuvres", "OeuvreID.desc"),
            api("Technique?order=TechniqueID.asc"),
            api("Support?order=SupportID.asc"),
            apiAll("tblRelations", "id.asc")
        ]);
        oeuvres = o; techniques = t; supports = s; relations = rels;
        popF(); applyF();
    } catch(e) { console.error(e); }
}

// --- VUE GALAXIE ---
function renderGalaxy() {
    const mn = document.getElementById("mn");
    mn.innerHTML = '<div id="galaxy-canvas"></div>';
    
    // Création des nœuds avec vos images de Supabase
    const nodes = oeuvres.map(o => ({
        id: o.OeuvreID,
        name: o.Titre || "Sans titre",
        img: o.txtImageNameLink ? `${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(o.txtImageNameLink)}?width=100&height=100&resize=cover` : null
    }));

    const links = relations.map(r => ({ source: r.source_id, target: r.target_id }));

    const Graph = ForceGraph()(document.getElementById('galaxy-canvas'))
        .graphData({ nodes, links })
        .nodeCanvasObject((node, ctx) => {
            const size = 12;
            if (node.img) {
                const img = new Image(); img.src = node.img;
                ctx.save(); ctx.beginPath();
                ctx.arc(node.x, node.y, size/2, 0, 2*Math.PI); ctx.clip();
                try { ctx.drawImage(img, node.x - size/2, node.y - size/2, size, size); } catch(e){}
                ctx.restore();
            }
            ctx.strokeStyle = '#c8a86e'; ctx.lineWidth = 0.5; ctx.stroke();
        })
        .onNodeClick(node => sel(node.id))
        .backgroundColor('#0b0b0b')
        .linkColor(() => '#333');
}

// --- NAVIGATION ---
function sv(v) {
    curV = v;
    document.querySelectorAll("#nv button").forEach(b => b.classList.remove("active"));
    document.getElementById("sb").style.display = (v === "galaxy") ? "none" : "flex";
    
    if(v === "galaxy") {
        document.querySelector("nav button:nth-child(2)").classList.add("active");
        renderGalaxy();
    } else {
        // Redirection vers vos fonctions originales
        if(v === "list") { document.querySelector("nav button:nth-child(1)").classList.add("active"); rList(); det(selId); }
        // ... autres vues ...
    }
}

// --- AJOUT DE LIEN ---
async function addRelation(sourceId) {
    const targetId = document.getElementById("rel-select").value;
    const { error } = await supabase.from('tblRelations').insert([{ source_id: sourceId, target_id: targetId }]);
    if(!error) { alert("Lien créé !"); load(); }
}

// Récupération de vos fonctions utilitaires originales (api, apiAll, etc.)
async function api(p,o={}){const s=p.includes("?")?"&":"?";const r=await fetch(`${SB}/rest/v1/${p}${s}apikey=${KEY}`,{...o,headers:{"Content-Type":"application/json",Prefer:"return=representation",apikey:KEY,Authorization:`Bearer ${KEY}`,...o.headers}});return r.json();}
async function apiAll(table,order,pageSize=1000){let all=[],offset=0;while(true){const data=await api(`${table}?order=${order}&limit=${pageSize}&offset=${offset}`);all=all.concat(data);if(data.length<pageSize)break;offset+=data.length;}return all;}

window.onload = load;
</script>
</body>
</html>
