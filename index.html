<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM — Inventaire</title>
<style>
/* Keeping your original styles exactly as they were */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a1a;--sf:#242424;--bd:#333;--tx:#e0e0e0;--mt:#888;--ac:#c8a86e;--ad:#8a7040;--dg:#a04040;--wh:#fff;--bk:#000}
body{font-family:'JetBrains Mono','SF Mono','Consolas',monospace;background:var(--bg);color:var(--tx)}
#app{display:flex;flex-direction:column;height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf);position:sticky;top:0;z-index:100}
header h1{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--ac);text-transform:uppercase}
nav{display:flex;gap:2px}
nav button{font-family:inherit;padding:5px 10px;font-size:10px;border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase;background:transparent;color:var(--mt)}
nav button.active{background:var(--ac);color:var(--bk);font-weight:700}
#debug{padding:3px 16px;font-size:9px;color:var(--mt);background:#1e1e1e;border-bottom:1px solid var(--bd)}
#debug.error{color:#ff6666}
.body{flex:1;display:flex;overflow:hidden}
.sidebar{width:280px;min-width:280px;border-right:1px solid var(--bd);background:var(--sf);display:flex;flex-direction:column;flex-shrink:0}
.filters{padding:8px 10px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:5px}
.filters input,.filters select{font-family:inherit;background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:5px 7px;font-size:11px;width:100%;outline:none}
.list{flex:1;overflow-y:auto}.list-item{padding:7px 10px;border-bottom:1px solid var(--bd);cursor:pointer;display:flex;gap:7px;align-items:center;border-left:3px solid transparent}
.list-item:hover{background:#2a2a2a}.list-item.active{background:rgba(138,112,64,0.19);border-left-color:var(--ac)}
.lt{width:36px;height:36px;object-fit:cover;background:var(--bg);flex-shrink:0;border:1px solid var(--bd)}
.lte{width:36px;height:36px;background:var(--bg);flex-shrink:0;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--mt)}
.li{flex:1;overflow:hidden}.ln{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ls{font-size:9px;color:var(--mt);margin-top:1px}
.badge{font-size:8px;padding:1px 4px;background:var(--ad);color:var(--wh);font-weight:600}
.stats{padding:10px;border-top:1px solid var(--bd);font-size:9px;color:var(--mt);margin-top:auto}
.main{flex:1;overflow-y:auto;padding:16px}
.iv{position:relative;background:var(--bk);border:1px solid var(--bd);margin-bottom:12px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.iv.zoomed{overflow:hidden}.iv.dragging{cursor:grabbing}
.iv img{display:block;max-width:100%;max-height:100%;user-select:none;-webkit-user-drag:none;cursor:zoom-in;transition:none}
.iv.zoomed img{cursor:grab}.iv .zbar{position:absolute;bottom:6px;right:6px;display:flex;gap:3px;z-index:10}
.iv .zbar button{font-family:inherit;font-size:9px;padding:2px 7px;background:rgba(36,36,36,0.85);color:var(--tx);border:1px solid var(--bd);cursor:pointer}
.iv .zlvl{position:absolute;bottom:6px;left:6px;font-size:9px;color:var(--mt);z-index:10}
.iv .wm{position:absolute;inset:0;pointer-events:none;z-index:5;opacity:0.06;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:60px;transform:rotate(-25deg);overflow:hidden;font-size:14px;color:var(--wh);letter-spacing:4px;font-weight:700;user-select:none}
.tstrip{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;padding:3px 0}
.tstrip img{width:44px;height:44px;object-fit:cover;border:2px solid transparent;cursor:pointer;background:var(--bg);flex-shrink:0}
.tstrip img.active{border-color:var(--ac)}
.tstrip .add{width:44px;height:44px;border:2px dashed var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mt);font-size:14px;flex-shrink:0;background:var(--bg)}
.dh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.dt{font-size:18px;font-weight:700;color:var(--wh)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-bottom:12px}
.fl{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;margin-bottom:1px}
.nb{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:6px 0;border-bottom:1px solid var(--bd)}
.nbtn{font-family:inherit;padding:3px 10px;font-size:10px;background:var(--sf);color:var(--tx);border:1px solid var(--bd);cursor:pointer}
.btn{font-family:inherit;padding:7px 14px;font-size:10px;font-weight:600;border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--ac);color:var(--bk)}.bd{background:var(--dg);color:var(--wh)}.bs{background:var(--sf);color:var(--tx)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.ffull{grid-column:1/-1}.ff{display:flex;flex-direction:column;gap:3px}
.ff input,.ff select,.ff textarea{font-family:inherit;background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:5px 7px;font-size:11px;width:100%;outline:none}
.toast{position:fixed;bottom:16px;right:16px;padding:8px 14px;font-size:11px;font-weight:600;z-index:1000}
.tok{background:var(--ac);color:var(--bk)}.terr{background:var(--dg);color:var(--wh)}
.hidden{display:none}
.rel-card{background:var(--sf);border:1px solid var(--bd);padding:10px;margin-top:15px}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast hidden"></div>

<script>
const SB="https://mcrzsxrcoexnlwmaunte.supabase.co",KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo",BKT="paintings",STR=`${SB}/storage/v1/object/public/${BKT}`;
const WM_TEXT="© PEM";
let oeuvres=[],techniques=[],supports=[],formats=[],contacts=[],imgTbl=[];
let tM={},sM={},fM={},cM={},filtered=[],selId=null,curV="list";

// ZOOM State
let _z={s:1,tx:0,ty:0,ox:0,oy:0,isD:false};const ZMAX=4;

async function api(p,o={}){const s=p.includes("?")?"&":"?";const r=await fetch(`${SB}/rest/v1/${p}${s}apikey=${KEY}`,{...o,headers:{"Content-Type":"application/json",Prefer:"return=representation",apikey:KEY,Authorization:`Bearer ${KEY}`,...o.headers}});if(!r.ok)throw new Error(`${r.status}: ${await r.text()}`);return r.json();}
async function apiAll(table,order,pageSize=1000){let all=[],offset=0;while(true){const data=await api(`${table}?order=${order}&limit=${pageSize}&offset=${offset}`);all=all.concat(data);if(data.length<pageSize)break;offset+=data.length;}return all;}

function iu(f){if(!f)return null;const fn=f.replace('.jpg','.avif');return f.startsWith("http")?fn:`${STR}/${encodeURIComponent(fn)}`;}
function iuThumb(f,size){if(!f)return null;const s=size||200;return`${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(f.replace('.jpg','.avif'))}?width=${s}&height=${s}&resize=cover`;}
function esc(s){if(!s)return"";const d=document.createElement("div");d.textContent=String(s);return d.innerHTML;}
function gv(id){return document.getElementById(id)?.value||"";}
function gvn(id){const v=gv(id);return v?Number(v):null;}
function iFor(oid){return imgTbl.filter(i=>i.OeuvreID===oid).sort((a,b)=>(a.SeqNo||0)-(b.SeqNo||0));}

async function load(){
  try{
    const[o,t,su,f,c,im]=await Promise.all([
      apiAll("OeuvresComplete","OeuvreID.desc"), // Loading your custom View
      api("Technique?order=TechniqueID.asc"),
      api("Support?order=SupportID.asc"),
      api("Format?order=FormatID.asc"),
      api("Contact?order=ContactID.asc"),
      apiAll("tblImage","OeuvreID.asc,SeqNo.asc")
    ]);
    oeuvres=o;techniques=t;supports=su;formats=f;contacts=c;imgTbl=im;
    tM=Object.fromEntries(t.map(x=>[x.TechniqueID,x.Technique]));
    sM=Object.fromEntries(su.map(x=>[x.SupportID,x.Support]));
    initA();popF();applyF();
  }catch(e){console.error("ERREUR: "+e.message);}
}

function initA(){
  document.getElementById("app").innerHTML=`<header><h1>PEM — Inventaire</h1><nav id="nv"><button class="active" onclick="sv('list')">Liste</button><button onclick="sv('gallery')">Galerie</button></nav></header><div id="debug"></div><div class="body"><aside class="sidebar" id="sb"><div class="filters"><input type="text" id="q" placeholder="Recherche..." oninput="applyF()"><select id="fT" onchange="applyF()"></select><select id="fS" onchange="applyF()"></select><select id="fSort" onchange="applyF()"><option value="id_desc">ID ↓</option><option value="id_asc">ID ↑</option><option value="title_asc">Titre A-Z</option></select></div><div class="list" id="ls"></div><div class="stats" id="st"></div></aside><main class="main" id="mn"></main></div>`;
}

function popF(){
    document.getElementById("fT").innerHTML='<option value="">Toutes techniques</option>'+techniques.map(t=>`<option value="${t.TechniqueID}">${t.Technique}</option>`).join("");
    document.getElementById("fS").innerHTML='<option value="">Tous supports</option>'+supports.map(s=>`<option value="${s.SupportID}">${s.Support}</option>`).join("");
}

function applyF(){
  const q=gv("q").toLowerCase(),t=gv("fT"),su=gv("fS"),s=gv("fSort");
  filtered=oeuvres.filter(o=>{
    if(q&&!(o.Titre||"").toLowerCase().includes(q)&&!String(o.OeuvreID).includes(q))return false;
    if(t&&String(o.Technique)!==t)return false;
    if(su&&String(o.Support)!==su)return false;
    return true;
  });
  if(s==="id_desc")filtered.sort((a,b)=>b.OeuvreID-a.OeuvreID);
  if(s==="title_asc")filtered.sort((a,b)=>(a.Titre||"").localeCompare(b.Titre||""));
  rList();
}

function rList(){
  document.getElementById("ls").innerHTML=filtered.map(o=>`
    <div class="list-item ${selId===o.OeuvreID?'active':''}" onclick="sel(${o.OeuvreID})">
        <img class="lt" src="${iuThumb(o.txtImageNameLink,80)}">
        <div class="li">
            <div class="ln"><span style="color:var(--mt);font-size:9px">${o.OeuvreID}</span> ${esc(o.Titre||"Sans titre")}</div>
            <div class="ls">${tM[o.Technique]||""} · ${o.statusLabel||"?"}</div>
        </div>
    </div>`).join("");
}

function sel(id){selId=id;rList();det(id);}

function det(id){
  const o=oeuvres.find(x=>x.OeuvreID===id);if(!o)return;
  const mn=document.getElementById("mn");
  const ims=iFor(o.OeuvreID);let aI=[];
  if(o.txtImageNameLink)aI.push({url:iu(o.txtImageNameLink),thumb:iuThumb(o.txtImageNameLink,100),name:o.txtImageNameLink});
  ims.forEach(im=>{const fn=im.txtImageNameLink||im.txtImageName;if(fn&&!aI.find(a=>a.name===fn))aI.push({url:iu(fn),thumb:iuThumb(fn,100),name:fn});});

  mn.innerHTML=`
    <div class="nb">
        <div class="dt">${esc(o.Titre||"Sans titre")} <span class="badge" style="background:var(--ac);color:var(--bk)">${esc(o.statusLabel || "WIP")}</span></div>
        <div class="pos">ID ${o.OeuvreID}</div>
    </div>

    ${aI.length?`
    <div class="iv" id="ivw"><img id="vi" src="${aI[0].url}" draggable="false"><div class="wm">${WM_TEXT}</div><div class="zlvl" id="zl">100%</div><div class="zbar"><button onclick="zm(0.7)">−</button><button onclick="zm(1)">Fit</button><button onclick="zm(1.5)">+</button></div></div>
    <div class="tstrip">${aI.map((im,idx)=>`<img src="${im.thumb}" class="${idx===0?'active':''}" onclick="swI(${idx})">`).join("")}<div class="add">+</div></div>`
    : `<div class="dz">Aucune image</div>`}

    <div class="fgrid">
      <div class="ff"><div class="fl">Technique</div><select id="dt_k">${techniques.map(t=>`<option value="${t.TechniqueID}" ${t.TechniqueID==o.Technique?'selected':''}>${t.Technique}</option>`).join("")}</select></div>
      <div class="ff"><div class="fl">Support</div><select id="dt_s">${supports.map(s=>`<option value="${s.SupportID}" ${s.SupportID==o.Support?'selected':''}>${s.Support}</option>`).join("")}</select></div>
      <div class="ffull ff"><div class="fl">Commentaires</div><textarea id="dt_m">${esc(o.Commentaires||"")}</textarea></div>
      <div class="ffull ff"><div class="fl">Historique</div><textarea id="dt_q">${esc(o.Historique||"")}</textarea></div>

      <div class="ffull rel-card">
        <div class="fl" style="color:var(--ac); margin-bottom:10px">Carte des Relations</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
            <div>
                <div style="font-size:9px; color:var(--mt); margin-bottom:4px">← SOURCES / ÉTUDES</div>
                ${(o.previous_works || []).map(p=>`<button class="nbtn" onclick="sel(${p.relatedId})" style="width:100%;text-align:left;margin-bottom:3px"><small>${p.type}:</small> ${esc(p.relatedTitle)}</button>`).join('') || '<div style="font-size:10px;color:var(--bd)">—</div>'}
            </div>
            <div>
                <div style="font-size:9px; color:var(--mt); margin-bottom:4px">→ SUITES / DÉRIVATIONS</div>
                ${(o.next_works || []).map(n=>`<button class="nbtn" onclick="sel(${n.relatedId})" style="width:100%;text-align:left;margin-bottom:3px;border-color:var(--ac)"><small>${n.type}:</small> ${esc(n.relatedTitle)}</button>`).join('') || '<div style="font-size:10px;color:var(--bd)">—</div>'}
            </div>
        </div>
      </div>
    </div>

    <div class="brow" style="margin-top:20px">
      <button class="btn bp" onclick="saveDet(${o.OeuvreID})">Enregistrer</button>
      <button class="btn bs" onclick="det(${o.OeuvreID})">Annuler</button>
    </div>
  `;
  if(aI.length){window._aI=aI;window._aIdx=0;initIZ();}
}

// ZOOM & IMAGE LOGIC (Your original functions)
function initIZ(){
    const w=document.getElementById("ivw"),i=document.getElementById("vi");if(!w||!i)return;
    i.onload=()=>{_z.s=1;_z.tx=0;_z.ty=0;aIZ();};
    w.onmousedown=e=>{if(_z.s>1){_z.isD=true;w.classList.add("dragging");_z.ox=e.clientX-_z.tx;_z.oy=e.clientY-_z.ty;}};
    window.onmousemove=e=>{if(_z.isD){_z.tx=e.clientX-_z.ox;_z.ty=e.clientY-_z.oy;aIZ();}};
    window.onmouseup=()=>{_z.isD=false;w.classList.remove("dragging");};
}
function zm(f){if(f===1){_z.s=1;_z.tx=0;_z.ty=0;}else{_z.s=Math.min(ZMAX,Math.max(1,_z.s*f));}aIZ();}
function aIZ(){const i=document.getElementById("vi"),l=document.getElementById("zl"),w=document.getElementById("ivw");if(!i||!l||!w)return;i.style.transform=`translate(${_z.tx}px,${_z.ty}px) scale(${_z.s})`;l.textContent=Math.round(_z.s*100)+"%";w.classList.toggle("zoomed",_z.s>1);}
function swI(idx){window._aIdx=idx;const i=document.getElementById("vi");if(i)i.src=window._aI[idx].url;document.querySelectorAll(".tstrip img").forEach((m,j)=>m.classList.toggle("active",idx===j));}

async function saveDet(id){
    const data={Commentaires:gv("dt_m"),Historique:gv("dt_q"),Technique:gvn("dt_k"),Support:gvn("dt_s")};
    try{await api(`Oeuvres?OeuvreID=eq.${id}`,{method:"PATCH",body:JSON.stringify(data)});load();}catch(e){alert(e.message);}
}

function sv(v){curV=v;document.getElementById("sb").style.display=v==='list'?'':'none';applyF();}

window.onload=load;
</script>
</body>
</html>
