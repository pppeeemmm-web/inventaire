<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM — Canvas 3000px</title>
<style>
/* --- BASE --- */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#121212;--sf:#1e1e1e;--bd:#333;--tx:#e0e0e0;--ac:#c8a86e;--dg:#a04040}
body{font-family:monospace;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh}
#app{display:flex;height:100vh;width:100vw}

/* --- SIDEBAR (Fixe 300px pour la stabilité) --- */
.sidebar {
    width: 300px; min-width: 300px; background: var(--sf);
    border-right: 1px solid var(--bd); display: flex; flex-direction: column; z-index: 100;
}
.filters { padding: 15px; border-bottom: 1px solid var(--bd); }
.filters input { width: 100%; background: #000; border: 1px solid var(--bd); color: var(--ac); padding: 8px; outline: none; }

.list { 
    flex: 1; overflow-y: auto; padding: 10px;
    display: grid; grid-template-columns: repeat(5, 50px); gap: 5px;
}

.list-item { width: 50px; height: 50px; cursor: grab; }
.thumb { 
    width: 50px; height: 50px; border-radius: 50%; border: 1px solid #444; 
    object-fit: cover; display: block; 
}

/* --- CANVAS AREA (Scrollable) --- */
.viewport { flex: 1; overflow: auto; background: #0a0a0a; position: relative; }

#canvas {
    width: 3000px; height: 3000px;
    background-image: radial-gradient(#222 1px, transparent 1px);
    background-size: 50px 50px;
    position: relative;
}

/* Éléments sur le canvas */
.art-node {
    position: absolute; width: 50px; height: 50px;
    cursor: move; z-index: 10;
}
.art-node img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--ac); pointer-events: none; }
.art-node .id-label {
    position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
    font-size: 8px; background: #000; color: var(--ac); padding: 0 2px;
}

.zone-node {
    position: absolute; border: 2px dashed #666; border-radius: 50%;
    background: rgba(200,168,110,0.05); display: flex; align-items: center; justify-content: center;
}
.zone-node input { background: transparent; border: none; color: #888; text-align: center; width: 80%; outline: none; }

/* Trash */
#trash {
    position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px;
    border-radius: 50%; border: 2px solid var(--dg); color: var(--dg);
    display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.8);
    font-size: 30px; z-index: 200;
}

.btn-add {
    position: fixed; top: 20px; right: 40px; padding: 10px 20px;
    background: var(--ac); color: #000; border: none; cursor: pointer; font-weight: bold; z-index: 150;
}
</style>
</head>
<body>

<div id="app">
    <aside class="sidebar">
        <div class="filters"><input type="text" id="q" placeholder="FILTRER ID..." oninput="renderSidebar()"></div>
        <div class="list" id="ls"></div>
    </aside>

    <main class="viewport">
        <button class="btn-add" onclick="addZone()">+ AJOUTER CERCLE</button>
        <div id="canvas"></div>
        <div id="trash">×</div>
    </main>
</div>

<script>
const SB="https://mcrzsxrcoexnlwmaunte.supabase.co", BKT="paintings";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo";

let oeuvres = [];
const canvas = document.getElementById('canvas');

async function init() {
    const r = await fetch(`${SB}/rest/v1/Oeuvres?select=OeuvreID,txtImageNameLink&order=OeuvreID.desc&apikey=${KEY}`, { headers: { apikey: KEY } });
    oeuvres = await r.json();
    renderSidebar();
}

function renderSidebar() {
    const q = document.getElementById('q').value;
    const filtered = oeuvres.filter(o => String(o.OeuvreID).includes(q));
    document.getElementById('ls').innerHTML = filtered.map(o => `
        <div class="list-item" draggable="true" ondragstart="onDrag(event, '${o.txtImageNameLink}', ${o.OeuvreID})">
            <img class="thumb" src="${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(o.txtImageNameLink)}?width=50&height=50&resize=cover">
        </div>`).join('');
}

function onDrag(e, img, id) {
    e.dataTransfer.setData("img", img);
    e.dataTransfer.setData("id", id);
}

canvas.ondragover = e => e.preventDefault();
canvas.ondrop = e => {
    e.preventDefault();
    const img = e.dataTransfer.getData("img");
    const id = e.dataTransfer.getData("id");
    
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left - 25;
    const y = e.clientY - rect.top - 25;

    const div = document.createElement('div');
    div.className = 'art-node';
    div.style.left = x + 'px'; div.style.top = y + 'px';
    div.innerHTML = `<img src="${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(img)}?width=100&height=100&resize=cover"><div class="id-label">${id}</div>`;
    
    bindDrag(div);
    canvas.appendChild(div);
};

function bindDrag(el) {
    let active = false, ox, oy;

    el.onmousedown = e => {
        if(e.target.tagName === 'INPUT') return;
        active = true;
        el.style.zIndex = 1000;
        // Position relative de la souris dans l'objet
        ox = e.clientX - el.offsetLeft;
        oy = e.clientY - el.offsetTop;
        document.getElementById('trash').style.display = 'flex';

        const move = e => {
            if(!active) return;
            // Calcul direct par rapport au canvas parent
            el.style.left = (e.clientX - ox) + "px";
            el.style.top = (e.clientY - oy) + "px";
        };

        const up = e => {
            active = false;
            el.style.zIndex = 10;
            document.getElementById('trash').style.display = 'none';
            const t = document.getElementById('trash').getBoundingClientRect();
            if(e.clientX > t.left && e.clientY > t.top) el.remove();
            window.removeEventListener('mousemove', move);
            window.removeEventListener('mouseup', up);
        };

        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
    };
}

function addZone() {
    const div = document.createElement('div');
    div.className = 'zone-node';
    div.style.width = '400px'; div.style.height = '400px';
    div.style.left = '500px'; div.style.top = '500px';
    div.innerHTML = `<input type="text" value="THEME">`;
    bindDrag(div);
    canvas.appendChild(div);
}

init();
</script>
</body>
</html>
