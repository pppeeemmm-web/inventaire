<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PEM — Engine V11 (No-Fail)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111;--sf:#1a1a1a;--bd:#333;--tx:#eee;--ac:#c8a86e;--dg:#ff4444}
body{font-family:monospace;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh}
#app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar { width: 300px; min-width: 300px; background: var(--sf); border-right: 1px solid var(--bd); display: flex; flex-direction: column; z-index: 100;}
.filters { padding: 15px; border-bottom: 1px solid var(--bd); }
.filters input { width: 100%; background: #000; border: 1px solid var(--bd); color: var(--ac); padding: 10px; outline: none; border-radius: 4px; border: 1px solid var(--bd); }
.list { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(5, 45px); gap: 10px; }
.list-item { width: 45px; height: 45px; cursor: grab; }
.thumb { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #444; object-fit: cover; pointer-events: none; }

/* VIEWPORT */
.viewport { flex: 1; position: relative; overflow: hidden; background: #080808; cursor: crosshair; }
#canvas {
    position: absolute; width: 10000px; height: 10000px; transform-origin: 0 0;
    background-image: radial-gradient(#222 1px, transparent 1px); background-size: 80px 80px;
    top:0; left:0; pointer-events: none;
}

/* NODES */
.node { position: absolute; z-index: 10; user-select: none; pointer-events: auto; will-change: transform, left, top; }
.art-node { width: 80px; height: 80px; transform-origin: center center; }
.art-node img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--ac); display: block; pointer-events: none; background: #000;}
.id-tag { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); font-size: 9px; background: #000; color: var(--ac); padding: 1px 4px; border: 1px solid var(--ac); border-radius: 3px; pointer-events: none; white-space: nowrap;}

/* UI */
.ui-top { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
.btn { background: var(--sf); color: var(--tx); border: 1px solid var(--bd); padding: 8px 15px; cursor: pointer; font-size: 11px; border-radius: 4px;}
.btn:hover { border-color: var(--ac); color: var(--ac); }
#trash { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--dg); color: var(--dg); display: none; align-items: center; justify-content: center; z-index: 2000; background: rgba(0,0,0,0.9); font-size: 24px; pointer-events: none;}
</style>
</head>
<body>

<div id="app">
    <aside class="sidebar">
        <div class="filters"><input type="text" id="q" placeholder="FILTRER ID..." oninput="renderSidebar()"></div>
        <div id="ls" class="list"></div>
    </aside>

    <main class="viewport" id="v">
        <div class="ui-top">
            <span id="zVal" style="color:var(--ac); align-self: center; margin-right: 10px;">100%</span>
            <button class="btn" onclick="saveMap()">💾 SAUVEGARDER</button>
        </div>
        <div id="canvas"></div>
        <div id="trash">×</div>
    </main>
</div>

<script>
const SB="https://mcrzsxrcoexnlwmaunte.supabase.co", BKT="paintings";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo";

let oeuvres = [], scale = 1, px = 0, py = 0;
const canvas = document.getElementById('canvas');
const viewport = document.getElementById('v');

async function init() {
    try {
        const r = await fetch(`${SB}/rest/v1/Oeuvres?select=OeuvreID,txtImageNameLink&apikey=${KEY}`, { headers: { apikey: KEY } });
        oeuvres = await r.json();
        renderSidebar();
        loadMap();
        updateTransform();
    } catch(e) { console.error("Erreur Init:", e); }
}

function renderSidebar() {
    const q = document.getElementById('q').value;
    const filtered = oeuvres.filter(o => String(o.OeuvreID).includes(q));
    document.getElementById('ls').innerHTML = filtered.map(o => `
        <div class="list-item" draggable="true" ondragstart="dragStart(event, '${o.txtImageNameLink}', ${o.OeuvreID})">
            <img class="thumb" src="${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(o.txtImageNameLink)}?width=100&height=100&resize=cover">
        </div>`).join('');
}

function updateTransform() {
    canvas.style.transform = `translate(${px}px, ${py}px) scale(${scale})`;
    document.getElementById('zVal').textContent = Math.round(scale * 100) + "%";
    
    // Scale Visuel Fixe (Max 80px, Min 15px)
    const sFix = scale > 1 ? (1 / scale) : Math.max(1, (15/80) / scale);
    document.querySelectorAll('.art-node').forEach(n => n.style.transform = `scale(${sFix})`);
}

// ZOOM (Standard)
viewport.onwheel = e => {
    e.preventDefault();
    const ns = Math.min(Math.max(scale * (e.deltaY > 0 ? 0.9 : 1.1), 0.01), 10);
    const r = viewport.getBoundingClientRect();
    px = (e.clientX - r.left) - ((e.clientX - r.left) - px) * (ns / scale);
    py = (e.clientY - r.top) - ((e.clientY - r.top) - py) * (ns / scale);
    scale = ns;
    updateTransform();
};

// DROP FROM SIDEBAR
function dragStart(e, img, id) { e.dataTransfer.setData("img", img); e.dataTransfer.setData("id", id); }
viewport.ondragover = e => e.preventDefault();
viewport.ondrop = e => {
    e.preventDefault();
    const img = e.dataTransfer.getData("img"), id = e.dataTransfer.getData("id");
    if(!img) return;
    const x = (e.pageX - viewport.offsetLeft - px) / scale - 40;
    const y = (e.pageY - viewport.offsetTop - py) / scale - 40;
    createNode(img, id, x, y);
};

function createNode(img, id, x, y) {
    const div = document.createElement('div');
    div.className = 'node art-node';
    div.dataset.img = img; div.dataset.id = id;
    div.lx = x; div.ly = y; // Coordonnées logiques internes
    div.style.left = x + 'px'; div.style.top = y + 'px';
    div.innerHTML = `<img src="${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(img)}?width=160&height=160&resize=cover"><div class="id-tag">${id}</div>`;
    bindNode(div);
    canvas.appendChild(div);
    updateTransform();
}

function bindNode(el) {
    el.onmousedown = e => {
        e.preventDefault(); e.stopPropagation();
        el.style.zIndex = 3000;
        document.getElementById('trash').style.display = 'flex';

        // On calcule l'offset initial entre la souris et le point logique de l'objet
        const startX = e.pageX;
        const startY = e.pageY;
        const initLX = el.lx;
        const initLY = el.ly;

        const move = ev => {
            // Le mouvement est calculé uniquement par rapport au point de départ du clic
            const dx = (ev.pageX - startX) / scale;
            const dy = (ev.pageY - startY) / scale;
            
            el.lx = initLX + dx;
            el.ly = initLY + dy;
            
            el.style.left = el.lx + "px";
            el.style.top = el.ly + "px";
        };

        const up = ev => {
            window.removeEventListener('mousemove', move);
            window.removeEventListener('mouseup', up);
            document.getElementById('trash').style.display = 'none';
            el.style.zIndex = 10;
            // Trash check
            if (ev.clientX > window.innerWidth - 100 && ev.clientY > window.innerHeight - 100) el.remove();
        };

        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
    };
}

// PANNING DU FOND
let isPan = false, lastX, lastY;
viewport.onmousedown = e => { if(e.target === viewport) { isPan = true; lastX = e.pageX; lastY = e.pageY; } };
window.addEventListener('mousemove', e => {
    if(!isPan) return;
    px += (e.pageX - lastX);
    py += (e.pageY - lastY);
    lastX = e.pageX; lastY = e.pageY;
    updateTransform();
});
window.addEventListener('mouseup', () => isPan = false);

function saveMap() {
    const data = Array.from(document.querySelectorAll('.art-node')).map(n => ({x: n.lx, y: n.ly, img: n.dataset.img, id: n.dataset.id}));
    localStorage.setItem('pem_v11', JSON.stringify(data));
    alert("Map sauvegardée (Coordonnées stables)");
}

function loadMap() {
    const raw = localStorage.getItem('pem_v11');
    if(raw) JSON.parse(raw).forEach(n => createNode(n.img, n.id, n.x, n.y));
}

init();
</script>
</body>
</html>
