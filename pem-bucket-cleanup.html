<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PEM — Bucket Cleanup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a1a;--sf:#242424;--bd:#333;--tx:#e0e0e0;--mt:#888;--ac:#c8a86e;--dg:#a04040;--wh:#fff;--bk:#000;--ok:#4a8a4a}
body{font-family:'JetBrains Mono','Consolas',monospace;background:var(--bg);color:var(--tx);padding:20px}
h1{font-size:15px;font-weight:700;color:var(--ac);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
h2{font-size:12px;font-weight:700;color:var(--wh);margin:20px 0 8px;padding:6px 0;border-bottom:1px solid var(--bd)}
.stats{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px;padding:12px;background:var(--sf);border:1px solid var(--bd)}
.stat{text-align:center}
.stat .n{font-size:22px;font-weight:700;color:var(--ac)}
.stat .l{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:1px}
table{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:16px}
th{text-align:left;padding:4px 8px;background:var(--sf);color:var(--mt);font-size:9px;text-transform:uppercase;letter-spacing:0.5px;position:sticky;top:0}
td{padding:4px 8px;border-bottom:1px solid var(--bd)}
tr:hover{background:#2a2a2a}
.tag{padding:1px 6px;font-size:8px;font-weight:700;border-radius:2px;display:inline-block}
.tag-ok{background:var(--ok);color:var(--wh)}
.tag-old{background:#886600;color:var(--wh)}
.tag-orphan{background:var(--dg);color:var(--wh)}
.tag-dup{background:#664488;color:var(--wh)}
.btn{font-family:inherit;padding:5px 12px;font-size:10px;font-weight:600;border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
.bp{background:var(--ac);color:var(--bk)}.bd{background:var(--dg);color:var(--wh)}.bs{background:var(--sf);color:var(--tx);border:1px solid var(--bd)}
.btn:hover{opacity:0.85}
.brow{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
#log{background:var(--bk);border:1px solid var(--bd);padding:12px;font-size:10px;max-height:300px;overflow-y:auto;white-space:pre-wrap;margin-top:12px}
.ok{color:var(--ok)}.err{color:var(--dg)}.wrn{color:#cc8800}
.sz{color:var(--mt);font-size:9px}
img.thumb{width:40px;height:40px;object-fit:cover;background:var(--bg);border:1px solid var(--bd)}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.filter-bar select,.filter-bar input{font-family:inherit;background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:4px 8px;font-size:10px}
</style>
</head>
<body>
<h1>PEM — Bucket Cleanup & Import</h1>
<div class="brow">
  <button class="btn bp" onclick="scan()">Scanner le bucket</button>
  <button class="btn bs" onclick="renameAll()" id="btnRename" disabled>Renommer les non-W_</button>
  <button class="btn bd" onclick="deleteDups()" id="btnDel" disabled>Supprimer les doublons</button>
</div>
<h2>Import</h2>
<div class="brow">
  <button class="btn bp" onclick="moveWorks()">1. Déplacer works → paintings</button>
  <button class="btn bs" onclick="batchCreate()" id="btnCreate" disabled>2. Créer oeuvres pour orphelins</button>
</div>
<div class="stats" id="stats">Cliquer "Scanner" pour commencer</div>
<div class="filter-bar" id="filterBar" style="display:none">
  <label style="font-size:9px;color:var(--mt)">Filtrer: 
    <select id="filterType" onchange="renderTable()">
      <option value="all">Tout</option>
      <option value="renamed">W_ renommés ✓</option>
      <option value="old">Non renommés (à renommer)</option>
      <option value="dup">Doublons (à supprimer)</option>
      <option value="orphan">Orphelins sans W_</option>
      <option value="orphan-w">Orphelins W_ (pas d'oeuvre)</option>
    </select>
  </label>
  <input type="text" id="filterQ" placeholder="Rechercher..." oninput="renderTable()">
  <span id="filterCount" style="font-size:9px;color:var(--mt)"></span>
</div>
<div id="tbl"></div>
<div id="log" style="display:none"></div>

<script>
const SB="https://mcrzsxrcoexnlwmaunte.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo";
const BKT="paintings";

let bucketFiles=[], oeuvres=[], imgTbl=[], analysis=[];

async function api(p){
  const r=await fetch(`${SB}/rest/v1/${p}${p.includes("?")?"&":"?"}apikey=${KEY}`,{headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}});
  return r.json();
}

async function listBucket(){
  // Try the storage list endpoint with required prefix field
  let all=[],offset=0;
  while(true){
    const r=await fetch(`${SB}/storage/v1/object/list/${BKT}`,{
      method:"POST",
      headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
      body:JSON.stringify({prefix:"",limit:1000,offset,sortBy:{column:"name",order:"asc"}})
    });
    if(!r.ok){
      const txt=await r.text();
      throw new Error(`List ${r.status}: ${txt}`);
    }
    const items=await r.json();
    if(!items.length)break;
    all=all.concat(items);
    if(items.length<1000)break;
    offset+=items.length;
  }
  return all.filter(f=>f.name&&f.id);
}

function fmtSize(bytes){
  if(!bytes)return"?";
  if(bytes<1024)return bytes+"B";
  if(bytes<1024*1024)return(bytes/1024).toFixed(0)+"KB";
  return(bytes/(1024*1024)).toFixed(1)+"MB";
}

async function scan(){
  document.getElementById("stats").textContent="Chargement...";
  
  try{
  // Load oeuvres and tblImage
  const[o,im]=await Promise.all([
    api("Oeuvres?select=OeuvreID,Titre,txtImageNameLink,NomOriginal&order=OeuvreID.asc&limit=2000"),
    api("tblImage?select=ImageID,OeuvreID,txtImageNameLink&order=OeuvreID.asc&limit=5000")
  ]);
  oeuvres=o;imgTbl=im;
  
  document.getElementById("stats").textContent=`${o.length} oeuvres chargées, scan du bucket...`;
  
  // List bucket
  bucketFiles=await listBucket();
  
  if(!bucketFiles.length){
    document.getElementById("stats").innerHTML=`<div style="color:var(--dg)">Aucun fichier trouvé. Vérifier les policies RLS sur storage.objects.<br>Exécuter dans SQL Editor :<br><code>CREATE POLICY "allow_anon_select" ON storage.objects FOR SELECT TO anon USING (bucket_id = 'paintings');</code></div>`;
    return;
  }
  
  // Build lookup: which filenames are referenced by oeuvres/tblImage
  const refByOeuvre=new Set();
  const oeuvreByFile={};
  oeuvres.forEach(o=>{
    if(o.txtImageNameLink){refByOeuvre.add(o.txtImageNameLink);oeuvreByFile[o.txtImageNameLink]=o;}
    if(o.NomOriginal){refByOeuvre.add(o.NomOriginal);if(!oeuvreByFile[o.NomOriginal])oeuvreByFile[o.NomOriginal]=o;}
  });
  imgTbl.forEach(i=>{
    if(i.txtImageNameLink){refByOeuvre.add(i.txtImageNameLink);if(!oeuvreByFile[i.txtImageNameLink])oeuvreByFile[i.txtImageNameLink]={OeuvreID:i.OeuvreID};}
  });
  
  // Normalize: extract core content for matching
  // Strip W_ prefix, strip extension, normalize separators, lowercase
  function norm(name){
    let n=name.replace(/\.[^.]+$/,""); // strip extension
    // Strip W_XXXX_XX_ prefix if present
    n=n.replace(/^W_\d{4}_\d{2}_/,"");
    // Normalize all separators to underscore, lowercase
    n=n.replace(/[\s\-]+/g,"_").replace(/_+/g,"_").replace(/^_|_$/g,"").toLowerCase();
    return n;
  }
  
  // Also extract a "signature" — the date+PE/PEM/DSCF/DSC number part
  // e.g. "20221118_PE19477" from any variant of the filename
  function sig(name){
    let n=name.replace(/\.[^.]+$/,"");
    n=n.replace(/^W_\d{4}_\d{2}_/,"");
    n=n.replace(/[\s\-]+/g,"_").replace(/_+/g,"_").toLowerCase();
    // Try to extract date_PExxxxx pattern
    const m=n.match(/(\d{8})[_]*(pe|pem|dscf|dsc|pa|img)[\d_]+/i);
    if(m)return m[0];
    // Try just PE/PEM number
    const m2=n.match(/(pe|pem|dscf|dsc)\d+/i);
    if(m2)return m2[0];
    return n;
  }
  
  // Group bucket files by signature AND by norm to find duplicates
  const bySig={};
  const byNorm={};
  bucketFiles.forEach(f=>{
    const s=sig(f.name);
    const n=norm(f.name);
    if(!bySig[s])bySig[s]=[];
    bySig[s].push(f.name);
    if(!byNorm[n])byNorm[n]=[];
    byNorm[n].push(f.name);
  });
  
  // Build W_ file set for quick lookup
  const wFiles=new Set(bucketFiles.filter(f=>f.name.startsWith("W_")).map(f=>f.name));
  
  // Analyze each bucket file
  analysis=bucketFiles.map(f=>{
    const name=f.name;
    const isW=name.startsWith("W_");
    const linked=refByOeuvre.has(name);
    const oeuvre=oeuvreByFile[name]||null;
    
    // Find duplicate: for non-W_ files, check if a W_ file with same norm or sig exists
    let hasDup=false,dupName="";
    if(!isW){
      // Method 1: same normalized name
      const n=norm(name);
      const groupN=byNorm[n]||[];
      const wMatchN=groupN.find(g=>g.startsWith("W_")&&g!==name);
      if(wMatchN){hasDup=true;dupName=wMatchN;}
      
      // Method 2: same signature (date+PE number)
      if(!hasDup){
        const s=sig(name);
        const groupS=bySig[s]||[];
        const wMatchS=groupS.find(g=>g.startsWith("W_")&&g!==name);
        if(wMatchS){hasDup=true;dupName=wMatchS;}
      }
      
      // Method 3: via oeuvre DB link
      if(!hasDup&&oeuvre){
        const wName=oeuvre.txtImageNameLink;
        if(wName&&wName.startsWith("W_")&&wName!==name&&wFiles.has(wName)){
          hasDup=true;dupName=wName;
        }
      }
    }
    
    // Try to find linked oeuvre even if not directly referenced
    let foundOeuvre=oeuvre;
    if(!foundOeuvre&&!isW){
      // Search by NomOriginal match
      const match=oeuvres.find(o=>o.NomOriginal===name);
      if(match)foundOeuvre=match;
    }
    if(!foundOeuvre&&isW){
      // Extract ID from W_ name: W_0201_01_... → 201
      const m=name.match(/^W_(\d{4})_/);
      if(m){
        const id=parseInt(m[1]);
        const match=oeuvres.find(o=>o.OeuvreID===id);
        if(match)foundOeuvre=match;
      }
    }
    
    let status;
    if(isW&&(linked||foundOeuvre))status="renamed";
    else if(isW&&!linked&&!foundOeuvre)status="orphan-w";
    else if(!isW&&hasDup)status="dup";
    else if(!isW&&(linked||foundOeuvre))status="old";
    else status="orphan";
    
    return{
      name,
      size:f.metadata?.size||0,
      mime:f.metadata?.mimetype||"",
      isW,linked,oeuvre:foundOeuvre,status,hasDup,dupName,
      oeuvreID:foundOeuvre?.OeuvreID||null,
      titre:foundOeuvre?.Titre||""
    };
  });
  
  // Stats
  const renamed=analysis.filter(a=>a.status==="renamed").length;
  const old=analysis.filter(a=>a.status==="old").length;
  const dup=analysis.filter(a=>a.status==="dup").length;
  const orphan=analysis.filter(a=>a.status==="orphan"||a.status==="orphan-w").length;
  const totalSize=analysis.reduce((s,a)=>s+a.size,0);
  const dupSize=analysis.filter(a=>a.status==="dup").reduce((s,a)=>s+a.size,0);
  const orphanSize=analysis.filter(a=>a.status==="orphan"||a.status==="orphan-w").reduce((s,a)=>s+a.size,0);
  
  document.getElementById("stats").innerHTML=`
    <div class="stat"><div class="n">${bucketFiles.length}</div><div class="l">fichiers total</div></div>
    <div class="stat"><div class="n">${renamed}</div><div class="l">W_ renommés ✓</div></div>
    <div class="stat"><div class="n">${old}</div><div class="l">non renommés</div></div>
    <div class="stat"><div class="n">${dup}</div><div class="l">doublons</div></div>
    <div class="stat"><div class="n">${orphan}</div><div class="l">orphelins</div></div>
    <div class="stat"><div class="n">${fmtSize(totalSize)}</div><div class="l">taille totale</div></div>
    <div class="stat"><div class="n" style="color:var(--dg)">${fmtSize(dupSize)}</div><div class="l">récupérable (doublons)</div></div>
    <div class="stat"><div class="n" style="color:#886600">${fmtSize(orphanSize)}</div><div class="l">orphelins (taille)</div></div>
  `;
  
  document.getElementById("filterBar").style.display="flex";
  document.getElementById("btnRename").disabled=old===0;
  document.getElementById("btnDel").disabled=dup===0;
  document.getElementById("btnCreate").disabled=orphan===0;
  renderTable();
  }catch(e){
    document.getElementById("stats").innerHTML=`<div style="color:var(--dg)">Erreur: ${e.message}<br><br>Si l'erreur concerne les permissions, exécuter dans Supabase SQL Editor :<br><code>CREATE POLICY "allow_anon_select" ON storage.objects FOR SELECT TO anon USING (bucket_id = 'paintings');</code></div>`;
  }
}

function renderTable(){
  const filter=document.getElementById("filterType").value;
  const q=(document.getElementById("filterQ").value||"").toLowerCase();
  
  let items=analysis;
  if(filter!=="all")items=items.filter(a=>a.status===filter);
  if(q)items=items.filter(a=>a.name.toLowerCase().includes(q)||(a.titre||"").toLowerCase().includes(q)||String(a.oeuvreID||"").includes(q));
  
  document.getElementById("filterCount").textContent=`${items.length} fichiers`;
  
  const thumbUrl=(name)=>`${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(name)}?width=80&height=80&resize=cover`;
  
  document.getElementById("tbl").innerHTML=`<table>
    <tr><th></th><th>Fichier</th><th>Statut</th><th>Oeuvre</th><th>Taille</th><th>Doublon W_</th></tr>
    ${items.slice(0,500).map(a=>{
      const tag=a.status==="renamed"?"tag-ok":a.status==="old"?"tag-old":a.status==="dup"?"tag-dup":a.status==="orphan-w"?"tag-orphan":"tag-orphan";
      const label=a.status==="renamed"?"W_ ✓":a.status==="old"?"à renommer":a.status==="dup"?"doublon":a.status==="orphan-w"?"orphelin W_":"orphelin";
      return`<tr>
        <td><img class="thumb" src="${thumbUrl(a.name)}" loading="lazy" onerror="this.style.display='none'"></td>
        <td style="word-break:break-all;max-width:400px">${a.name}</td>
        <td><span class="tag ${tag}">${label}</span></td>
        <td>${a.oeuvreID?`${a.oeuvreID} — ${(a.titre||"S/T").slice(0,30)}`:""}</td>
        <td class="sz">${fmtSize(a.size)}</td>
        <td style="font-size:9px;color:var(--mt)">${a.hasDup?a.dupName:""}</td>
      </tr>`;
    }).join("")}
  </table>${items.length>500?`<div style="padding:8px;color:var(--mt);font-size:9px">${items.length-500} de plus non affichés</div>`:""}`;
}

function log(msg,cls){
  const el=document.getElementById("log");
  el.style.display="block";
  el.innerHTML+=`<span class="${cls||""}">${msg}</span>\n`;
  el.scrollTop=el.scrollHeight;
}

async function renameAll(){
  const items=analysis.filter(a=>a.status==="old");
  if(!items.length){log("Rien à renommer","wrn");return;}
  if(!confirm(`Renommer ${items.length} fichiers vers la convention W_ ?`))return;
  
  log(`── Rename ${items.length} fichiers ──`);
  let ok=0,err=0;
  
  for(const a of items){
    if(!a.oeuvre)continue;
    const oid=a.oeuvre.OeuvreID;
    // Build W_ name
    const ext=a.name.split(".").pop().toLowerCase();
    const base=a.name.replace(/\.[^.]+$/,"").replace(/[^a-zA-Z0-9_-]/g,"_").replace(/_+/g,"_").replace(/^_|_$/g,"");
    const wName=`W_${String(oid).padStart(4,"0")}_01_${base}.${ext}`;
    
    try{
      // Download
      const dl=await fetch(`${SB}/storage/v1/object/public/${BKT}/${encodeURIComponent(a.name)}`);
      if(!dl.ok)throw new Error(`Download ${dl.status}`);
      const blob=await dl.blob();
      
      // Upload with new name
      const up=await fetch(`${SB}/storage/v1/object/${BKT}/${encodeURIComponent(wName)}`,{
        method:"POST",headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":blob.type,"x-upsert":"true"},body:blob
      });
      if(!up.ok)throw new Error(`Upload ${up.status}`);
      
      // Update oeuvre record
      await fetch(`${SB}/rest/v1/Oeuvres?OeuvreID=eq.${oid}`,{
        method:"PATCH",headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json",Prefer:"return=minimal"},
        body:JSON.stringify({txtImageNameLink:wName,NomOriginal:a.name})
      });
      
      log(`✓ ${a.name} → ${wName}`,"ok");ok++;
    }catch(e){
      log(`✕ ${a.name}: ${e.message}`,"err");err++;
    }
  }
  log(`\n── ${ok} renommés, ${err} erreurs ──`);
  if(ok>0)setTimeout(scan,1000);
}

async function deleteDups(){
  const items=analysis.filter(a=>a.status==="dup");
  if(!items.length){log("Pas de doublons","wrn");return;}
  
  const totalSize=items.reduce((s,a)=>s+a.size,0);
  if(!confirm(`Supprimer ${items.length} anciens fichiers (${fmtSize(totalSize)}) qui ont déjà un W_ ?\n\nLes fichiers W_ restent.`))return;
  
  log(`── Suppression ${items.length} doublons ──`);
  let ok=0,err=0;
  
  for(const a of items){
    try{
      const r=await fetch(`${SB}/storage/v1/object/${BKT}`,{
        method:"DELETE",headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
        body:JSON.stringify({prefixes:[a.name]})
      });
      if(!r.ok)throw new Error(`${r.status}`);
      log(`✓ Supprimé: ${a.name} (${fmtSize(a.size)})`,"ok");ok++;
    }catch(e){
      log(`✕ ${a.name}: ${e.message}`,"err");err++;
    }
  }
  log(`\n── ${ok} supprimés, ${err} erreurs ──`);
  if(ok>0)setTimeout(scan,2000);
}

// ═══ MOVE WORKS → PAINTINGS ═══
async function moveWorks(){
  log("── Listing bucket 'works' ──");
  
  // List works bucket
  let workFiles=[];
  let offset=0;
  while(true){
    const r=await fetch(`${SB}/storage/v1/object/list/works`,{
      method:"POST",
      headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
      body:JSON.stringify({prefix:"",limit:1000,offset,sortBy:{column:"name",order:"asc"}})
    });
    if(!r.ok){
      const txt=await r.text();
      log(`Erreur listing works: ${r.status} — ${txt}`,"err");
      log("Vérifier que le bucket 'works' existe et que la policy SELECT est active.","wrn");
      return;
    }
    const items=await r.json();
    if(!items.length)break;
    workFiles=workFiles.concat(items.filter(f=>f.name&&f.id));
    if(items.length<1000)break;
    offset+=items.length;
  }
  
  if(!workFiles.length){log("Bucket 'works' vide ou inexistant.","wrn");return;}
  
  log(`${workFiles.length} fichiers trouvés dans 'works'`);
  if(!confirm(`Déplacer ${workFiles.length} fichiers de 'works' vers 'paintings' ?`))return;
  
  let ok=0,err=0,skip=0;
  for(const f of workFiles){
    try{
      // Check if file already exists in paintings
      const exists=bucketFiles.find(bf=>bf.name===f.name);
      if(exists){log(`⊘ Skip (existe déjà): ${f.name}`,"wrn");skip++;continue;}
      
      // Download from works
      const dl=await fetch(`${SB}/storage/v1/object/public/works/${encodeURIComponent(f.name)}`);
      if(!dl.ok)throw new Error(`Download ${dl.status}`);
      const blob=await dl.blob();
      
      // Upload to paintings
      const up=await fetch(`${SB}/storage/v1/object/${BKT}/${encodeURIComponent(f.name)}`,{
        method:"POST",headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":blob.type,"x-upsert":"true"},body:blob
      });
      if(!up.ok)throw new Error(`Upload ${up.status}`);
      
      // Delete from works
      const del=await fetch(`${SB}/storage/v1/object/works`,{
        method:"DELETE",headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
        body:JSON.stringify({prefixes:[f.name]})
      });
      
      log(`✓ ${f.name} (${fmtSize(f.metadata?.size||0)})`,"ok");ok++;
    }catch(e){
      log(`✕ ${f.name}: ${e.message}`,"err");err++;
    }
  }
  log(`\n── ${ok} déplacés, ${skip} existants skippés, ${err} erreurs ──`);
  if(ok>0){log("Re-scan dans 3s...","wrn");setTimeout(scan,3000);}
}

// ═══ BATCH CREATE OEUVRES FOR ORPHANS ═══
async function batchCreate(){
  const orphans=analysis.filter(a=>a.status==="orphan"||a.status==="orphan-w");
  if(!orphans.length){log("Pas d'orphelins","wrn");return;}
  
  if(!confirm(`Créer ${orphans.length} nouvelles oeuvres (une par image orpheline) ?\n\nChaque fichier sera renommé en W_ et lié à une nouvelle oeuvre.\nTitre par défaut: 'S/T'. Vous pourrez éditer ensuite.`))return;
  
  log(`── Création de ${orphans.length} oeuvres ──`);
  
  // Get real max OeuvreID from database
  let maxIdData;
  try{
    maxIdData=await api("Oeuvres?select=OeuvreID&order=OeuvreID.desc&limit=1");
  }catch(e){}
  let maxId=(maxIdData&&maxIdData.length)?maxIdData[0].OeuvreID:oeuvres.reduce((m,o)=>Math.max(m,o.OeuvreID||0),0);
  log(`Max ID actuel: ${maxId}`);
  let ok=0,err=0;
  
  for(const a of orphans){
    try{
      // Double-check this file isn't already linked to an oeuvre (from previous partial run)
      const check=await api(`Oeuvres?txtImageNameLink=eq.${encodeURIComponent(a.name)}&select=OeuvreID&limit=1`);
      if(check&&check.length){log(`⊘ Skip (déjà lié à ID ${check[0].OeuvreID}): ${a.name}`,"wrn");continue;}
      
      maxId++;
      const newId=maxId;
      const ext=a.name.split(".").pop().toLowerCase();
      const base=a.name.replace(/\.[^.]+$/,"").replace(/^W_\d{4}_\d{2}_/,"").replace(/[^a-zA-Z0-9_-]/g,"_").replace(/_+/g,"_").replace(/^_|_$/g,"");
      const wName=`W_${String(newId).padStart(4,"0")}_01_${base}.${ext}`;
      
      // Extract year from filename if possible (YYYYMMDD pattern)
      const ym=a.name.match(/(20\d{2})\d{4}/);
      const year=ym?ym[1]+"-01-01":null;
      
      // If file already has W_ prefix, just rename properly
      if(a.isW){
        // Download and re-upload with correct W_ name for new ID
        const dl=await fetch(`${SB}/storage/v1/object/public/${BKT}/${encodeURIComponent(a.name)}`);
        if(!dl.ok)throw new Error(`Download ${dl.status}`);
        const blob=await dl.blob();
        const up=await fetch(`${SB}/storage/v1/object/${BKT}/${encodeURIComponent(wName)}`,{
          method:"POST",headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":blob.type,"x-upsert":"true"},body:blob
        });
        if(!up.ok)throw new Error(`Upload ${up.status}`);
      }else{
        // Download and upload with W_ name
        const dl=await fetch(`${SB}/storage/v1/object/public/${BKT}/${encodeURIComponent(a.name)}`);
        if(!dl.ok)throw new Error(`Download ${dl.status}`);
        const blob=await dl.blob();
        const up=await fetch(`${SB}/storage/v1/object/${BKT}/${encodeURIComponent(wName)}`,{
          method:"POST",headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":blob.type,"x-upsert":"true"},body:blob
        });
        if(!up.ok)throw new Error(`Upload ${up.status}`);
      }
      
      // Create oeuvre record
      const data={
        OeuvreID:newId,
        Titre:"S/T",
        txtImageNameLink:wName,
        NomOriginal:a.name,
        Statut:4,
        "Catalogué":false,
        Exposable:false
      };
      if(year)data["Année"]=year;
      
      const r=await fetch(`${SB}/rest/v1/Oeuvres`,{
        method:"POST",
        headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json",Prefer:"return=minimal"},
        body:JSON.stringify(data)
      });
      if(!r.ok)throw new Error(`DB ${r.status}: ${await r.text()}`);
      
      log(`✓ ID ${newId}: ${a.name} → ${wName}${year?` (${year.slice(0,4)})`:""}`,"ok");ok++;
    }catch(e){
      log(`✕ ${a.name}: ${e.message}`,"err");err++;
    }
  }
  log(`\n── ${ok} oeuvres créées, ${err} erreurs ──`);
  if(ok>0){log("Re-scan dans 3s...","wrn");setTimeout(scan,3000);}
}
</script>
</body>
</html>
