<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM — Cluster System</title>
<style>
/* --- BASE & COULEURS --- */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a1a;--sf:#242424;--bd:#333;--tx:#e0e0e0;--mt:#888;--ac:#c8a86e;--ad:#8a7040;--dg:#a04040;--wh:#fff;--bk:#000}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh}
#app{display:flex;flex-direction:column;height:100%}

header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf);z-index:110}
header h1{font-size:12px;letter-spacing:2px;color:var(--ac);text-transform:uppercase}

.body-container{flex:1;display:flex;overflow:hidden;position:relative}

/* --- SIDEBAR HOVER (10 COL) --- */
.sidebar {
    width: 100px; min-width: 100px; background: var(--sf); border-right: 1px solid var(--bd);
    display: flex; flex-direction: column; transition: width 0.3s ease; z-index: 100;
}
.sidebar:hover { width: 500px; }
.filters { padding: 10px; background: #1e1e1e; border-bottom: 1px solid var(--bd); display: flex; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.sidebar:hover .filters { opacity: 1; pointer-events: auto; }
.filters input { flex:1; background: var(--bg); border: 1px solid var(--bd); color: var(--tx); padding: 5px; font-size: 11px; outline: none; }

.list { flex: 1; display: grid; grid-template-columns: repeat(10, 50px); grid-auto-rows: 50px; overflow-y: auto; overflow-x: hidden; }
.list-item { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: grab; position: relative; }

/* Style des disques */
.thumb-wrap { 
    width: 42px; height: 42px; border-radius: 50%; overflow: hidden; 
    border: 1px solid #444; background: #000; position: relative; pointer-events: none;
}
.thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
.id-ov { position: absolute; font-size: 7px; color: var(--ac); background: rgba(0,0,0,0.6); padding: 1px 2px; bottom: 4px; left: 50%; transform: translateX(-50%); }

/* --- CANVAS & VIEWPORT --- */
.main-viewport { flex: 1; position: relative; background: #111; overflow: hidden; }

#canvas-container {
    position: absolute; width: 8000px; height: 8000px; 
    transform-origin: 0 0; 
    background: radial-gradient(circle, #222 1px, transparent 1px);
    background-size: 40px 40px;
    top: 0; left: 0;
}

/* Éléments déposés */
.dropped-art {
    position: absolute; z-index: 10; cursor: move;
    width: 50px; height: 50px;
}
.dropped-art .thumb-wrap { width: 100%; height: 100%; border-color: var(--bd); pointer-events: auto; }
.dropped-art:hover .thumb-wrap { border-color: var(--ac); }

.cluster-zone {
    position: absolute; border: 2px dashed var(--ad); border-radius: 50%;
    background: rgba(200, 168, 110, 0.05); display: flex; align-items: center; justify-content: center; z-index: 1; cursor: move;
}
.cluster-zone input { background: transparent; border: none; color: var(--ad); text-align: center; font-family: inherit; font-size: 14px; font-weight: bold; outline: none; }

.tools { display: flex; gap: 10px; align-items: center; }
.zoom-info { font-size: 10px; color: var(--mt); min-width: 45px; }
.btn { background: var(--sf); color: var(--tx); border: 1px solid var(--bd); padding: 6px 12px; font-size: 10px; cursor: pointer; text-transform: uppercase; }

#trash {
    position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px; 
    border: 2px solid var(--dg); border-radius: 50%; display: none; align-items: center; justify-content: center;
    color: var(--dg); background: rgba(160, 64, 64, 0.2); z-index: 200; font-size: 24px;
}
</style>
</head>
<body>

<div id="app">
    <header>
        <h1>PEM — WORKSPACE</h1>
        <div class="tools">
            <span class="zoom-info" id="zVal">100%</span>
            <button class="btn" onclick="addCluster()">+ Zone</button>
            <button class="btn" onclick="resetCanvas()" style="color:var(--dg)">Reset</button>
        </div>
    </header>

    <div class="body-container">
        <aside class="sidebar">
            <div class="filters"><input type="text" id="q" placeholder="Rechercher..." oninput="applyF()"></div>
            <div class="list" id="ls"></div>
        </aside>

        <main class="main-viewport" id="viewport">
            <div id="canvas-container"></div>
            <div id="trash">×</div>
        </main>
    </div>
</div>

<script>
const SB="https://mcrzsxrcoexnlwmaunte.supabase.co", BKT="paintings";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo";

let oeuvres = [], scale = 1, posX = 0, posY = 0;
const container = document.getElementById('canvas-container');
const viewport = document.getElementById('viewport');

async function load() {
    const r = await fetch(`${SB}/rest/v1/Oeuvres?select=*&order=OeuvreID.desc&apikey=${KEY}`, { headers: { apikey: KEY } });
    oeuvres = await r.json();
    applyF();
    updateTransform();
}

function applyF() {
    const q = document.getElementById('q').value.toLowerCase();
    const filtered = oeuvres.filter(o => (o.Titre||"").toLowerCase().includes(q) || String(o.OeuvreID).includes(q));
    document.getElementById('ls').innerHTML = filtered.map(o => `
        <div class="list-item" draggable="true" ondragstart="onDragStart(event, '${o.txtImageNameLink}', ${o.OeuvreID})">
            <div class="thumb-wrap">
                <img src="${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(o.txtImageNameLink)}?width=100&height=100&resize=cover">
                <div class="id-ov">${o.OeuvreID}</div>
            </div>
        </div>`).join('');
}

// --- TRANSFORMATIONS ---
function updateTransform() {
    container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    document.getElementById('zVal').textContent = Math.round(scale * 100) + "%";
}

viewport.onwheel = e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.min(Math.max(scale * delta, 0.1), 3);
    const rect = viewport.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    posX = mx - (mx - posX) * (newScale / scale);
    posY = my - (my - posY) * (newScale / scale);
    scale = newScale;
    updateTransform();
};

// --- DRAG & DROP LOGIC ---
function onDragStart(ev, img, id) {
    ev.dataTransfer.setData("img", img);
    ev.dataTransfer.setData("id", id);
}

viewport.ondragover = e => e.preventDefault(); // CRUCIAL : permet le drop

viewport.ondrop = e => {
    e.preventDefault();
    const imgName = e.dataTransfer.getData("img");
    const id = e.dataTransfer.getData("id");
    if(!imgName) return;

    const rect = container.getBoundingClientRect();
    const x = (e.clientX - rect.left) / scale - 25;
    const y = (e.clientY - rect.top) / scale - 25;

    const div = document.createElement('div');
    div.className = 'dropped-art';
    div.style.left = x + 'px'; div.style.top = y + 'px';
    div.innerHTML = `
        <div class="thumb-wrap">
            <img src="${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(imgName)}?width=200">
            <div class="id-ov">${id}</div>
        </div>`;
    
    makeDraggable(div);
    container.appendChild(div);
};

// --- MOTEUR DE DÉPLACEMENT (DRAG) ---
function makeDraggable(el) {
    let x1=0, y1=0, x2=0, y2=0;
    const trash = document.getElementById('trash');

    el.onmousedown = e => {
        if (e.target.tagName === 'INPUT') return;
        e.preventDefault();
        e.stopPropagation();
        
        x2 = e.clientX; y2 = e.clientY;
        trash.style.display = 'flex';

        document.onmousemove = e => {
            x1 = x2 - e.clientX; y1 = y2 - e.clientY;
            x2 = e.clientX; y2 = e.clientY;
            el.style.top = (el.offsetTop - y1 / scale) + "px";
            el.style.left = (el.offsetLeft - x1 / scale) + "px";
        };

        document.onmouseup = e => {
            document.onmousemove = null;
            trash.style.display = 'none';
            const t = trash.getBoundingClientRect();
            if(e.clientX > t.left && e.clientY > t.top) el.remove();
        };
    };
}

// --- NAVIGATION PAN (ESPACE + GLISSER) ---
let isPanning = false, startX, startY;
viewport.onmousedown = e => {
    if(e.target === viewport || e.target === container) {
        isPanning = true;
        startX = e.clientX - posX;
        startY = e.clientY - posY;
    }
};
window.onmousemove = e => {
    if(!isPanning) return;
    posX = e.clientX - startX;
    posY = e.clientY - startY;
    updateTransform();
};
window.onmouseup = () => isPanning = false;

function addCluster() {
    const div = document.createElement('div');
    div.className = 'cluster-zone';
    div.style.left = '400px'; div.style.top = '400px';
    div.style.width = '300px'; div.style.height = '300px';
    div.innerHTML = `<input type="text" value="GROUPE">`;
    makeDraggable(div);
    container.appendChild(div);
}

function resetCanvas() { if(confirm("Vider?")) container.innerHTML = ''; }

load();
</script>
</body>
</html>
