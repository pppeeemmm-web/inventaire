<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM — Inventaire & Galaxie</title>
<script src="https://unpkg.com/force-graph"></script>
<style>
    /* 1. YOUR ORIGINAL STYLES */
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#1a1a1a;--sf:#242424;--bd:#333;--tx:#e0e0e0;--mt:#888;--ac:#c8a86e;--ad:#8a7040;--dg:#a04040;--wh:#fff;--bk:#000}
    body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--tx)}
    #app{display:flex;flex-direction:column;height:100vh}
    header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf);z-index:100}
    header h1{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--ac);text-transform:uppercase}
    nav{display:flex;gap:5px}
    nav button{font-family:inherit;padding:6px 12px;font-size:10px;border:none;cursor:pointer;background:transparent;color:var(--mt);transition:0.2s}
    nav button.active{color:var(--ac);background:var(--bd);border-radius:4px}
    
    /* 2. GALAXY CONTAINER */
    #main{flex:1;position:relative;overflow:hidden}
    #galaxy-canvas{width:100%;height:100%;background:#0a0a0a}
    
    /* 3. ADMIN LINKER UI */
    .rel-picker{margin-top:20px;padding:15px;background:var(--sf);border:1px solid var(--bd);border-radius:4px}
    .rel-picker h4{font-size:10px;color:var(--ac);margin-bottom:10px}
    .rel-picker select{width:100%;background:var(--bg);color:var(--tx);border:1px solid var(--bd);padding:8px;margin-bottom:10px}
    .btn{padding:8px 16px;background:var(--ac);color:var(--bk);border:none;cursor:pointer;font-size:10px;font-weight:700}
</style>
</head>
<body>

<div id="app">
    <header>
        <h1>PEM <span id="view-title">/ INVENTAIRE</span></h1>
        <nav>
            <button onclick="changeView('grid')" id="nav-grid" class="active">Grille</button>
            <button onclick="changeView('galaxy')" id="nav-galaxy">Galaxie</button>
            <button onclick="changeView('admin')" id="nav-admin">Admin</button>
        </nav>
    </header>
    <main id="main"></main>
</div>

<script type="module">
    // IMPORT SUPABASE (Using your existing connection logic)
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    
    const SB_URL = "https://mcrzsxrcoexnlwmaunte.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo";
    const supabase = createClient(SB_URL, SB_KEY);

    let oeuvres = [];
    let relations = [];

    // DATA LOADING
    async function init() {
        const { data: oData } = await supabase.from('Oeuvres').select('*').order('OeuvreID', {ascending:false});
        const { data: rData } = await supabase.from('tblRelations').select('*');
        
        oeuvres = oData || [];
        relations = rData || [];
        
        renderGrid(); // Default view
    }

    // GALAXY RENDERER
    window.renderGalaxy = function() {
        const main = document.getElementById('main');
        main.innerHTML = '<div id="galaxy-canvas"></div>';
        
        const nodes = oeuvres.map(o => ({
            id: o.OeuvreID,
            name: o.Titre || "Sans titre",
            img: `${SB_URL}/storage/v1/object/public/paintings/${o.txtImageNameLink}?width=100&height=100&resize=contain`
        }));

        const links = relations.map(r => ({
            source: r.source_id,
            target: r.target_id
        }));

        ForceGraph()(document.getElementById('galaxy-canvas'))
            .graphData({ nodes, links })
            .nodeCanvasObject((node, ctx) => {
                const size = 12;
                const img = new Image();
                img.src = node.img;
                ctx.save();
                ctx.beginPath(); ctx.arc(node.x, node.y, size/2, 0, 2*Math.PI); ctx.clip();
                try { ctx.drawImage(img, node.x - size/2, node.y - size/2, size, size); } catch(e){}
                ctx.strokeStyle = '#c8a86e'; ctx.lineWidth = 0.5; ctx.stroke();
                ctx.restore();
            })
            .onNodeClick(node => alert(`Oeuvre: ${node.name}\nID: ${node.id}`))
            .linkColor(() => '#333')
            .backgroundColor('#000');
    };

    // NAVIGATION
    window.changeView = function(v) {
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav-${v}`).classList.add('active');
        
        if (v === 'galaxy') renderGalaxy();
        else if (v === 'grid') renderGrid();
        else renderAdmin();
    };

    // PLACEHOLDERS FOR YOUR ORIGINAL FUNCTIONS
    function renderGrid() {
        document.getElementById('main').innerHTML = '<div style="padding:20px">Votre grille originale apparaîtra ici.</div>';
    }
    function renderAdmin() {
        document.getElementById('main').innerHTML = '<div style="padding:20px">Votre interface admin apparaîtra ici.</div>';
    }

    init();
</script>
</body>
</html>
