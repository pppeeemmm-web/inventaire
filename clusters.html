<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM — Cluster Workspace</title>
<style>
/* --- BASE & COULEURS --- */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a1a;--sf:#242424;--bd:#333;--tx:#e0e0e0;--mt:#888;--ac:#c8a86e;--ad:#8a7040;--dg:#a04040;--wh:#fff;--bk:#000}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh}
#app{display:flex;flex-direction:column;height:100%}

header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf);z-index:110}
header h1{font-size:12px;letter-spacing:2px;color:var(--ac);text-transform:uppercase}

.body-container{flex:1;display:flex;overflow:hidden;position:relative}

/* --- SIDEBAR DYNAMIQUE (10 COL) --- */
.sidebar {
    width: 100px; min-width: 100px; background: var(--sf); border-right: 1px solid var(--bd);
    display: flex; flex-direction: column; transition: width 0.3s ease; z-index: 100;
}
.sidebar:hover { width: 500px; }
.filters { padding: 10px; background: #1e1e1e; border-bottom: 1px solid var(--bd); display: flex; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.sidebar:hover .filters { opacity: 1; pointer-events: auto; }
.filters input { flex:1; background: var(--bg); border: 1px solid var(--bd); color: var(--tx); padding: 5px; font-size: 11px; outline: none; }

.list { flex: 1; display: grid; grid-template-columns: repeat(10, 50px); grid-auto-rows: 50px; overflow-y: auto; overflow-x: hidden; }
.list-item { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: grab; position: relative; }

/* Style commun des disques (Sidebar & Canvas) */
.thumb-wrap { 
    width: 42px; height: 42px; border-radius: 50%; overflow: hidden; 
    border: 1px solid #444; background: #000; position: relative;
}
.thumb-wrap img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
.id-ov { position: absolute; font-size: 7px; color: var(--ac); background: rgba(0,0,0,0.6); padding: 1px 2px; pointer-events: none; bottom: 4px; left: 50%; transform: translateX(-50%); }

/* --- CANVAS & ZOOM --- */
.main-viewport { flex: 1; position: relative; background: #111; overflow: hidden; cursor: grab; }
.main-viewport:active { cursor: grabbing; }

#canvas-container {
    position: absolute; width: 5000px; height: 5000px; 
    transform-origin: 0 0; 
    background: radial-gradient(circle, #222 1px, transparent 1px);
    background-size: 40px 40px;
}

/* Éléments sur le canvas */
.dropped-art {
    position: absolute; cursor: move; z-index: 10;
    resize: both; overflow: visible; /* Permet le redimensionnement */
}
.dropped-art .thumb-wrap { width: 100%; height: 100%; border-width: 2px; }

/* Zone de Cluster */
.cluster-zone {
    position: absolute; border: 2px dashed var(--ad); border-radius: 50%;
    background: rgba(200, 168, 110, 0.05); display: flex; align-items: center; justify-content: center; z-index: 1; cursor: move;
}
.cluster-zone input { background: transparent; border: none; color: var(--ad); text-align: center; font-family: inherit; font-size: 14px; font-weight: bold; outline: none; }

/* Barre d'outils */
.tools { display: flex; gap: 10px; align-items: center; }
.zoom-info { font-size: 10px; color: var(--mt); min-width: 50px; text-align: center; }
.btn { background: var(--sf); color: var(--tx); border: 1px solid var(--bd); padding: 6px 12px; font-size: 10px; cursor: pointer; text-transform: uppercase; }
.btn:hover { border-color: var(--ac); color: var(--ac); }

#trash {
    position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px; 
    border: 2px solid var(--dg); border-radius: 50%; display: none; align-items: center; justify-content: center;
    color: var(--dg); background: rgba(160, 64, 64, 0.1); z-index: 200;
}
</style>
</head>
<body>

<div id="app">
    <header>
        <h1>PEM — CANVAS SYSTEM</h1>
        <div class="tools">
            <span class="zoom-info" id="zVal">100%</span>
            <button class="btn" onclick="adjustZoom(0.1)">+</button>
            <button class="btn" onclick="adjustZoom(-0.1)">-</button>
            <button class="btn" onclick="addCluster()">+ Zone</button>
            <button class="btn" onclick="resetCanvas()" style="color:var(--dg)">Vider</button>
        </div>
    </header>

    <div class="body-container">
        <aside class="sidebar">
            <div class="filters"><input type="text" id="q" placeholder="Rechercher..." oninput="applyF()"></div>
            <div class="list" id="ls"></div>
        </aside>

        <main class="main-viewport" id="viewport">
            <div id="canvas-container">
                </div>
            <div id="trash">×</div>
        </main>
    </div>
</div>

<script>
const SB="https://mcrzsxrcoexnlwmaunte.supabase.co", BKT="paintings";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo";

let oeuvres = [], filtered = [], scale = 1, posX = 0, posY = 0;
const container = document.getElementById('canvas-container');
const viewport = document.getElementById('viewport');

async function load() {
    const r = await fetch(`${SB}/rest/v1/Oeuvres?select=*&order=OeuvreID.desc&apikey=${KEY}`, { headers: { apikey: KEY } });
    oeuvres = await r.json();
    applyF();
    updateTransform();
}

function applyF() {
    const q = document.getElementById('q').value.toLowerCase();
    filtered = oeuvres.filter(o => (o.Titre||"").toLowerCase().includes(q) || String(o.OeuvreID).includes(q));
    const el = document.getElementById('ls');
    el.innerHTML = filtered.map(o => `
        <div class="list-item" draggable="true" ondragstart="drag(event, '${o.txtImageNameLink}', ${o.OeuvreID})">
            <div class="thumb-wrap">
                <img src="${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(o.txtImageNameLink)}?width=100&height=100&resize=cover">
                <div class="id-ov">${o.OeuvreID}</div>
            </div>
        </div>`).join('');
}

// --- ZOOM & PAN ---
function updateTransform() {
    container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    document.getElementById('zVal').textContent = Math.round(scale * 100) + "%";
}

viewport.onwheel = e => {
    e.preventDefault();
    const s = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.min(Math.max(scale * s, 0.1), 3);
    
    // Zoom vers la souris
    const rect = viewport.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    
    posX = mouseX - (mouseX - posX) * (newScale / scale);
    posY = mouseY - (mouseY - posY) * (newScale / scale);
    
    scale = newScale;
    updateTransform();
};

function adjustZoom(delta) { scale = Math.min(Math.max(scale + delta, 0.1), 3); updateTransform(); }

// --- DRAG & DROP ---
function drag(ev, img, id) {
    ev.dataTransfer.setData("img", img);
    ev.dataTransfer.setData("id", id);
}

viewport.ondragover = e => e.preventDefault();
viewport.ondrop = e => {
    e.preventDefault();
    const imgName = ev.dataTransfer.getData("img");
    const id = ev.dataTransfer.getData("id");
    if(!imgName) return;

    const rect = container.getBoundingClientRect();
    const x = (e.clientX - rect.left) / scale - 25;
    const y = (e.clientY - rect.top) / scale - 25;

    const div = document.createElement('div');
    div.className = 'dropped-art';
    div.style.left = x + 'px'; div.style.top = y + 'px';
    div.style.width = '50px'; div.style.height = '50px'; // Taille initiale identique
    
    div.innerHTML = `
        <div class="thumb-wrap">
            <img src="${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(imgName)}?width=400">
            <div class="id-ov">${id}</div>
        </div>`;
    
    makeDraggable(div);
    container.appendChild(div);
};

function makeDraggable(el) {
    let px=0, py=0;
    el.onmousedown = e => {
        if (e.target.tagName === 'INPUT') return;
        e.stopPropagation();
        px = e.clientX; py = e.clientY;
        document.getElementById('trash').style.display = 'flex';

        document.onmousemove = e => {
            el.style.left = (el.offsetLeft - (px - e.clientX) / scale) + "px";
            el.style.top = (el.offsetTop - (py - e.clientY) / scale) + "px";
            px = e.clientX; py = e.clientY;
        };

        document.onmouseup = e => {
            document.onmousemove = null;
            document.getElementById('trash').style.display = 'none';
            const tRect = document.getElementById('trash').getBoundingClientRect();
            if(e.clientX > tRect.left && e.clientY > tRect.top) el.remove();
        };
    };
}

function addCluster() {
    const div = document.createElement('div');
    div.className = 'cluster-zone';
    div.style.left = '500px'; div.style.top = '500px';
    div.style.width = '300px'; div.style.height = '300px';
    div.innerHTML = `<input type="text" value="GROUPE">`;
    makeDraggable(div);
    container.appendChild(div);
}

function resetCanvas() { if(confirm("Vider?")) container.innerHTML = ''; }

load();
</script>
</body>
</html>
