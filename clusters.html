<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM — Beehive Workspace Fixed</title>
<style>
/* --- BASE --- */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a1a;--sf:#242424;--bd:#333;--tx:#e0e0e0;--mt:#888;--ac:#c8a86e;--ad:#8a7040;--dg:#a04040;--bk:#000}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh}
#app{display:flex;flex-direction:column;height:100%}

header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf);z-index:110}
header h1{font-size:12px;letter-spacing:2px;color:var(--ac);text-transform:uppercase}

.body-container{flex:1;display:flex;overflow:hidden;position:relative}

/* --- SIDEBAR BEEHIVE --- */
.sidebar {
    width: 100px; min-width: 100px; background: var(--sf); border-right: 1px solid var(--bd);
    display: flex; flex-direction: column; transition: width 0.3s ease; z-index: 100;
}
.sidebar:hover { width: 500px; }

.filters { padding: 10px; background: #1e1e1e; border-bottom: 1px solid var(--bd); display: flex; opacity: 0; pointer-events: none; }
.sidebar:hover .filters { opacity: 1; pointer-events: auto; }
.filters input { flex:1; background: var(--bg); border: 1px solid var(--bd); color: var(--tx); padding: 5px; font-size: 11px; outline: none; }

.list { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 15px 5px; }
.beehive-row { display: flex; margin-bottom: -12px; }
.beehive-row:nth-child(even) { margin-left: 25px; }

.list-item { width: 50px; height: 50px; cursor: grab; position: relative; flex-shrink: 0; }
.thumb-wrap { width: 46px; height: 46px; border-radius: 50%; overflow: hidden; border: 1px solid #444; background: #000; position: relative; pointer-events: none; }
.thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.id-ov { position: absolute; font-size: 7px; color: var(--ac); background: rgba(0,0,0,0.8); padding: 1px 2px; bottom: 4px; left: 50%; transform: translateX(-50%); z-index: 5; border-radius: 2px; pointer-events: none; }

/* --- CANVAS --- */
.main-viewport { flex: 1; position: relative; background: #0f0f0f; overflow: hidden; }
#canvas-container {
    position: absolute; width: 8000px; height: 8000px; transform-origin: 0 0; 
    background: radial-gradient(circle, #222 1px, transparent 1px);
    background-size: 50px 50px; top: 0; left: 0;
}

/* ÉLÉMENTS SUR CANVAS */
.dropped-art, .cluster-zone { position: absolute; z-index: 20; touch-action: none; }
.dropped-art { width: 46px; height: 46px; cursor: move; }
.dropped-art .thumb-wrap { pointer-events: auto; }

.cluster-zone { border: 2px dashed var(--ad); border-radius: 50%; background: rgba(200, 168, 110, 0.05); display: flex; align-items: center; justify-content: center; }
.cluster-zone input { background: transparent; border: none; color: var(--ad); text-align: center; font-size: 14px; font-weight: bold; outline: none; width: 80%; pointer-events: auto; }

#trash {
    position: absolute; bottom: 30px; right: 30px; width: 64px; height: 64px; 
    border: 2px solid var(--dg); border-radius: 50%; display: none; align-items: center; justify-content: center;
    color: var(--dg); background: rgba(160, 64, 64, 0.2); z-index: 200; font-size: 24px;
}

.tools { display: flex; gap: 8px; align-items: center; }
.btn { background: var(--sf); color: var(--tx); border: 1px solid var(--bd); padding: 6px 10px; font-size: 10px; cursor: pointer; text-transform: uppercase; }
</style>
</head>
<body>

<div id="app">
    <header>
        <h1>PEM — CANVAS STABLE</h1>
        <div class="tools">
            <span id="zVal" style="font-size:10px; color:var(--mt); margin-right:10px">100%</span>
            <button class="btn" onclick="addCluster()">+ Zone</button>
            <button class="btn" onclick="resetCanvas()" style="color:var(--dg)">Reset</button>
        </div>
    </header>

    <div class="body-container">
        <aside class="sidebar">
            <div class="filters"><input type="text" id="q" placeholder="Filtre..." oninput="applyF()"></div>
            <div class="list" id="ls"></div>
        </aside>

        <main class="main-viewport" id="viewport">
            <div id="canvas-container"></div>
            <div id="trash">×</div>
        </main>
    </div>
</div>

<script>
const SB="https://mcrzsxrcoexnlwmaunte.supabase.co", BKT="paintings";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo";

let oeuvres = [], scale = 1, posX = 0, posY = 0;
const container = document.getElementById('canvas-container');
const viewport = document.getElementById('viewport');

async function load() {
    try {
        const r = await fetch(`${SB}/rest/v1/Oeuvres?select=*&order=OeuvreID.desc&apikey=${KEY}`, { headers: { apikey: KEY } });
        oeuvres = await r.json();
        applyF();
        updateTransform();
    } catch (e) { console.error(e); }
}

function applyF() {
    const q = document.getElementById('q').value.toLowerCase();
    const filtered = oeuvres.filter(o => (o.Titre||"").toLowerCase().includes(q) || String(o.OeuvreID).includes(q));
    const ls = document.getElementById('ls');
    ls.innerHTML = "";
    const itemsPerRow = 9; 
    for (let i = 0; i < filtered.length; i += itemsPerRow) {
        const row = document.createElement('div');
        row.className = 'beehive-row';
        row.innerHTML = filtered.slice(i, i + itemsPerRow).map(o => `
            <div class="list-item" draggable="true" ondragstart="onDragStart(event, '${o.txtImageNameLink}', ${o.OeuvreID})">
                <div class="thumb-wrap">
                    <img src="${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(o.txtImageNameLink)}?width=80&height=80&resize=cover">
                    <div class="id-ov">${o.OeuvreID}</div>
                </div>
            </div>`).join('');
        ls.appendChild(row);
    }
}

function updateTransform() {
    container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    document.getElementById('zVal').textContent = Math.round(scale * 100) + "%";
}

// Zoom
viewport.onwheel = e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.min(Math.max(scale * delta, 0.05), 4);
    const rect = viewport.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    posX = mx - (mx - posX) * (newScale / scale);
    posY = my - (my - posY) * (newScale / scale);
    scale = newScale;
    updateTransform();
};

// Drag start from sidebar
function onDragStart(ev, img, id) {
    ev.dataTransfer.setData("img", img);
    ev.dataTransfer.setData("id", id);
}

viewport.ondragover = e => e.preventDefault();
viewport.ondrop = e => {
    e.preventDefault();
    const imgName = e.dataTransfer.getData("img");
    const id = e.dataTransfer.getData("id");
    if(!imgName) return;
    const rect = container.getBoundingClientRect();
    const x = (e.clientX - rect.left) / scale - 23;
    const y = (e.clientY - rect.top) / scale - 23;
    const div = document.createElement('div');
    div.className = 'dropped-art';
    div.style.left = x + 'px'; div.style.top = y + 'px';
    div.innerHTML = `<div class="thumb-wrap"><img src="${SB}/storage/v1/render/image/public/${BKT}/${encodeURIComponent(imgName)}?width=200"><div class="id-ov">${id}</div></div>`;
    makeDraggable(div);
    container.appendChild(div);
};

// MOTEUR DE MOUVEMENT RE-CALIBRÉ
function makeDraggable(el) {
    let startX, startY, initialObjX, initialObjY;
    const trash = document.getElementById('trash');

    el.onmousedown = e => {
        if (e.target.tagName === 'INPUT') return;
        e.preventDefault(); e.stopPropagation();
        
        // On capture la position de la souris au moment du clic
        startX = e.clientX;
        startY = e.clientY;
        
        // On capture la position RÉELLE de l'objet sur le canvas
        initialObjX = parseFloat(el.style.left);
        initialObjY = parseFloat(el.style.top);
        
        trash.style.display = 'flex';
        el.style.zIndex = 1000;

        const onMove = e => {
            // On calcule combien de pixels la souris a bougé (en tenant compte du zoom)
            const dx = (e.clientX - startX) / scale;
            const dy = (e.clientY - startY) / scale;
            
            // On applique ce changement à la position initiale capturée au mousedown
            el.style.left = (initialObjX + dx) + "px";
            el.style.top = (initialObjY + dy) + "px";
        };

        const onUp = e => {
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
            trash.style.display = 'none';
            el.style.zIndex = 20;
            const t = trash.getBoundingClientRect();
            if(e.clientX > t.left && e.clientY > t.top) el.remove();
        };

        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
    };
}

// PAN
let isPanning = false, panStartX, panStartY;
viewport.onmousedown = e => {
    if(e.target === viewport || e.target === container) {
        isPanning = true;
        panStartX = e.clientX - posX; panStartY = e.clientY - posY;
    }
};
window.onmousemove = e => { if(isPanning) { posX = e.clientX - panStartX; posY = e.clientY - panStartY; updateTransform(); } };
window.onmouseup = () => isPanning = false;

function addCluster() {
    const div = document.createElement('div');
    div.className = 'cluster-zone';
    div.style.left = (viewport.offsetWidth/2 - posX)/scale - 175 + 'px'; 
    div.style.top = (viewport.offsetHeight/2 - posY)/scale - 175 + 'px';
    div.style.width = '350px'; div.style.height = '350px';
    div.innerHTML = `<input type="text" value="GROUPE">`;
    makeDraggable(div);
    container.appendChild(div);
}

function resetCanvas() { if(confirm("Effacer le canvas ?")) container.innerHTML = ''; }

load();
</script>
</body>
</html>
