<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM — Galaxy Light</title>
<script src="https://unpkg.com/force-graph"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:monospace;background:#050505;color:#c8a86e;overflow:hidden}
    header{padding:10px;border-bottom:1px solid #333;display:flex;justify-content:space-between;background:#111}
    #main{height:calc(100vh - 40px);width:100vw}
    .panel{position:absolute;top:50px;right:10px;background:#1a1a1a;padding:10px;border:1px solid #333;font-size:10px;width:200px;z-index:100}
    select, button{width:100%;margin-top:5px;background:#000;color:#c8a86e;border:1px solid #333;padding:5px;font-family:inherit}
    button:hover{background:#c8a86e;color:#000;cursor:pointer}
</style>
</head>
<body>

<header>
    <div style="font-size:10px;letter-spacing:2px">PEM / GALAXY</div>
    <div id="status" style="font-size:9px;color:#888">Chargement...</div>
</header>

<main id="main"></main>

<div id="ui" class="panel" style="display:none">
    <div id="sel-node" style="margin-bottom:10px;font-weight:bold"></div>
    <label>Lier à :</label>
    <select id="target-node"></select>
    <button onclick="createLink()">CRÉER LIEN</button>
</div>

<script>
// CONFIG
const SB_URL = "https://mcrzsxrcoexnlwmaunte.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo";
const supabase = typeof supabase !== 'undefined' ? supabase : window.supabase.createClient(SB_URL, SB_KEY);

let oeuvres = [], relations = [], selectedSource = null;
const imgCache = new Map();

async function init() {
    document.getElementById('status').innerText = "Sync Supabase...";
    const { data: o } = await supabase.from('Oeuvres').select('OeuvreID,Titre,txtImageNameLink');
    const { data: r } = await supabase.from('tblRelations').select('source_id,target_id');
    
    oeuvres = o || [];
    relations = r || [];
    
    document.getElementById('status').innerText = `${oeuvres.length} Noeuds / ${relations.length} Liens`;
    render();
}

function render() {
    const nodes = oeuvres.map(d => ({ 
        id: d.OeuvreID, 
        name: d.Titre,
        imgUrl: `${SB_URL}/storage/v1/object/public/paintings/${d.txtImageNameLink}?width=50&resizing=pattern` 
    }));
    
    const links = relations.map(r => ({ source: r.source_id, target: r.target_id }));

    const Graph = ForceGraph()(document.getElementById('main'))
        .graphData({ nodes, links })
        .nodeLabel('name')
        .nodeCanvasObject((node, ctx) => {
            const size = 10;
            ctx.beginPath(); ctx.arc(node.x, node.y, size/2, 0, 2*Math.PI);
            ctx.strokeStyle = selectedSource === node.id ? '#fff' : '#c8a86e';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // Fast Image Handling
            if (!imgCache.has(node.imgUrl)) {
                const img = new Image(); img.src = node.imgUrl;
                img.onload = () => imgCache.set(node.imgUrl, img);
            } else {
                const img = imgCache.get(node.imgUrl);
                ctx.save();
                ctx.beginPath(); ctx.arc(node.x, node.y, size/2, 0, 2*Math.PI); ctx.clip();
                ctx.drawImage(img, node.x - size/2, node.y - size/2, size, size);
                ctx.restore();
            }
        })
        .onNodeClick(node => {
            selectedSource = node.id;
            showUI(node);
        })
        .linkColor(() => '#222')
        .backgroundColor('#050505');
}

function showUI(node) {
    const ui = document.getElementById('ui');
    ui.style.display = 'block';
    document.getElementById('sel-node').innerText = node.name || `ID: ${node.id}`;
    const sel = document.getElementById('target-node');
    sel.innerHTML = oeuvres.filter(o => o.OeuvreID !== node.id)
        .map(o => `<option value="${o.OeuvreID}">${o.Titre || o.OeuvreID}</option>`).join('');
}

async function createLink() {
    const target = document.getElementById('target-node').value;
    const { error } = await supabase.from('tblRelations').insert([{ source_id: selectedSource, target_id: target }]);
    if (error) alert("RLS Security Error: Check Supabase Policies");
    else location.reload();
}

init();
</script>
</body>
</html>
