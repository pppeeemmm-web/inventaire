<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM — Inventaire & Galaxie</title>
<script src="https://unpkg.com/force-graph"></script>
<style>
/* Existing styles from your index.html maintained */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a1a;--sf:#242424;--bd:#333;--tx:#e0e0e0;--mt:#888;--ac:#c8a86e;--ad:#8a7040;--dg:#a04040;--wh:#fff;--bk:#000}
body{font-family:'JetBrains Mono','SF Mono','Consolas',monospace;background:var(--bg);color:var(--tx)}
#app{display:flex;flex-direction:column;height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf);position:sticky;top:0;z-index:100}
header h1{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--ac);text-transform:uppercase}
nav{display:flex;gap:2px}
nav button{font-family:inherit;padding:5px 10px;font-size:10px;border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase;background:transparent;color:var(--mt);transition:0.2s}
nav button.active{color:var(--ac);background:var(--bd)}

/* New Galaxy specific styles */
#galaxy-container { flex:1; position:relative; overflow:hidden; background:#000; }
.rel-ui { background:var(--sf); padding:10px; border:1px solid var(--bd); margin-top:10px; border-radius:4px; }
.rel-ui select { background:var(--bg); color:var(--tx); border:1px solid var(--bd); padding:4px; font-family:inherit; font-size:10px; width:100%; margin-bottom:5px; }
</style>
</head>
<body>
<div id="app">
    <header>
        <h1>PEM <span id="view-title">/ INVENTAIRE</span></h1>
        <nav>
            <button id="btn-grid" onclick="sv('grid')">Grille</button>
            <button id="btn-galaxy" onclick="sv('galaxy')">Galaxie</button>
            <button id="btn-admin" onclick="sv('admin')">Admin</button>
        </nav>
    </header>
    <main id="main"></main>
</div>

<script type="module">
// Integration of your existing Supabase logic + Galaxy Logic
// Note: Ensure your Supabase credentials remain the same as your previous version

let relations = []; // Global store for galaxy links

// --- NEW GALAXY RENDERER ---
function renderGalaxy() {
    const main = document.getElementById('main');
    main.innerHTML = '<div id="galaxy-canvas"></div>';
    
    const nodes = window.oeuvres.map(o => ({
        id: o.OeuvreID,
        img: `https://[YOUR_PROJECT_ID].supabase.co/storage/v1/object/public/art-inventory/${o.txtImageNameLink}?width=100&height=100&resize=contain`,
        name: o.Titre || "Sans titre"
    }));

    const links = window.relations.map(r => ({
        source: r.source_id,
        target: r.target_id,
        value: r.strength || 3
    }));

    const Graph = ForceGraph()(document.getElementById('galaxy-canvas'))
        .graphData({ nodes, links })
        .nodeCanvasObject((node, ctx, globalScale) => {
            const size = 12;
            const img = new Image();
            img.src = node.img;
            ctx.save();
            ctx.beginPath();
            ctx.arc(node.x, node.y, size/2, 0, 2 * Math.PI, false);
            ctx.clip();
            try {
                ctx.drawImage(img, node.x - size/2, node.y - size/2, size, size);
            } catch(e) {}
            ctx.stroke();
            ctx.restore();
        })
        .onNodeClick(node => {
            // Re-using your existing detail function
            window.det(node.id);
        })
        .linkLabel(r => r.relation_type)
        .linkWidth(l => l.value / 2)
        .linkColor(() => '#c8a86e33');
}

// --- UPDATED ADMIN LINKER (to be called inside your det() function) ---
window.addRelationUI = (currentId) => {
    return `
    <div class="rel-ui">
        <div class="fl">Lier à une oeuvre (Nœud)</div>
        <select id="new-rel-target">
            ${window.oeuvres.filter(o => o.OeuvreID !== currentId).map(o => 
                `<option value="${o.OeuvreID}">${o.Titre} (${o.OeuvreID})</option>`
            ).join('')}
        </select>
        <button class="btn bs" onclick="saveNewRelation(${currentId})">Connecter</button>
    </div>`;
};

window.saveNewRelation = async (sourceId) => {
    const targetId = document.getElementById('new-rel-target').value;
    const { error } = await supabase.from('tblRelations').insert([
        { source_id: sourceId, target_id: targetId, strength: 3 }
    ]);
    if (error) alert(error.message);
    else { alert("Lien galactique créé !"); location.reload(); }
};

// ... Include your existing load(), apiAll(), and det() logic here ...
// Ensure load() fetches tblRelations
</script>
</body>
</html>
