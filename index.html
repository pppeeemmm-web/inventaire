<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM — Inventaire & Clusters</title>
<script src="https://unpkg.com/force-graph"></script>
<style>
/* --- ALL YOUR ORIGINAL STYLES STAY HERE --- */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a1a;--sf:#242424;--bd:#333;--tx:#e0e0e0;--mt:#888;--ac:#c8a86e;--ad:#8a7040;--dg:#a04040;--wh:#fff;--bk:#000}
body{font-family:'JetBrains Mono','SF Mono','Consolas',monospace;background:var(--bg);color:var(--tx)}
#app{display:flex;flex-direction:column;height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--sf);position:sticky;top:0;z-index:100}
header h1{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--ac);text-transform:uppercase}
nav{display:flex;gap:2px}
nav button{font-family:inherit;padding:5px 10px;font-size:10px;border:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase;background:transparent;color:var(--mt);transition:0.2s}
nav button.active{color:var(--ac);background:var(--bd)}

/* --- CLUSTER SPECIFIC STYLES --- */
#cluster-view { width:100%; height:100%; background:#0b0b0b; display:none; position:relative; }
.cluster-controls { position:absolute; top:10px; right:10px; z-index:10; background:rgba(0,0,0,0.6); padding:5px; border:1px solid var(--bd); border-radius:4px; }
.cluster-controls button { font-size:9px; padding:3px 6px; }

/* Original structure styles */
.body{flex:1;display:flex;overflow:hidden}
.sidebar{width:280px;min-width:280px;border-right:1px solid var(--bd);background:var(--sf);display:flex;flex-direction:column;flex-shrink:0}
.list{flex:1;overflow-y:auto}
.main{flex:1;overflow-y:auto;padding:16px}
</style>
</head>
<body>
<div id="app">
    <header>
        <h1 id="mt">PEM — INVENTAIRE</h1>
        <nav id="nv">
            <button class="active" onclick="sv('list')">Liste</button>
            <button onclick="sv('cluster')">Constellations</button> <button onclick="sv('gallery')">Galerie</button>
            <button onclick="sv('form')">+ Nouvelle</button>
        </nav>
    </header>
    <div class="body">
        <aside class="sidebar" id="sb">
            <div class="filters">
                <input type="text" id="q" placeholder="Recherche..." oninput="applyF()">
                <select id="fT" onchange="applyF()"><option value="">Toutes techniques</option></select>
                <select id="fS" onchange="applyF()"><option value="">Tous supports</option></select>
            </div>
            <div class="list" id="ls"></div>
        </aside>
        <main class="main" id="mn">
            <div id="content-area"></div> <div id="cluster-view"> <div class="cluster-controls">
                    <button onclick="reCluster('Technique')">Par Technique</button>
                    <button onclick="reCluster('Support')">Par Support</button>
                </div>
                <div id="cluster-canvas"></div>
            </div>
        </main>
    </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// --- YOUR ORIGINAL CONFIG ---
const SB = "https://mcrzsxrcoexnlwmaunte.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jcnpzeHJjb2V4bmx3bWF1bnRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM3NDEsImV4cCI6MjA5MTc2OTc0MX0.ba6g7WsOA3dVq2ltDbelTMpzJhQkZiLB8HjrRhAhGuo";
const supabase = createClient(SB, KEY);

let oeuvres=[], relations=[], currentCluster = 'Technique';

async function load() {
    const { data: o } = await supabase.from('Oeuvres').select('*');
    const { data: r } = await supabase.from('tblRelations').select('*');
    oeuvres = o || [];
    relations = r || [];
    // Call your original render logic here
    sv('list'); 
}

// --- CLUSTER LOGIC ---
window.renderCluster = function() {
    const container = document.getElementById('cluster-canvas');
    const nodes = oeuvres.map(d => ({
        id: d.OeuvreID,
        name: d.Titre,
        group: d[currentCluster], // This creates the "Gravity" clusters
        img: `${SB}/storage/v1/object/public/paintings/${d.txtImageNameLink}?width=60`
    }));

    const links = relations.map(r => ({ source: r.source_id, target: r.target_id }));

    ForceGraph()(container)
        .graphData({ nodes, links })
        .nodeCanvasObject((node, ctx) => {
            const size = 10;
            ctx.beginPath(); ctx.arc(node.x, node.y, size/2, 0, 2*Math.PI);
            ctx.strokeStyle = '#c8a86e'; ctx.stroke();
            // Draw thumbnail placeholder
            ctx.fillStyle = '#333'; ctx.fill();
        })
        .onNodeClick(node => {
            // Re-use your existing selection logic
            window.sel(node.id); 
            sv('list');
        })
        .backgroundColor('#0b0b0b')
        .linkColor(() => '#333');
}

// --- UPDATED VIEW SWITCHER ---
window.sv = function(v) {
    const listArea = document.getElementById('content-area');
    const clusterArea = document.getElementById('cluster-view');
    const sidebar = document.getElementById('sb');

    // Reset visibility
    listArea.style.display = 'block';
    clusterArea.style.display = 'none';
    sidebar.style.display = 'flex';

    if (v === 'cluster') {
        listArea.style.display = 'none';
        sidebar.style.display = 'none';
        clusterArea.style.display = 'block';
        renderCluster();
    }
    
    // Add active class to nav buttons
    document.querySelectorAll('#nv button').forEach((b, i) => {
        b.classList.toggle('active', b.getAttribute('onclick').includes(v));
    });
}

window.reCluster = function(attr) {
    currentCluster = attr;
    renderCluster();
}

load();
</script>
</body>
</html>
